name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: gofmt (formatação)
        run: |
          unformatted=$(gofmt -l internal/ main.go)
          if [ -n "$unformatted" ]; then
            echo "Arquivos fora do padrão gofmt:"
            echo "$unformatted"
            echo "Rode: gofmt -w internal/ main.go"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Testes
        run: go test ./...
