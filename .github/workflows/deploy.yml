name: Deploy (Azure)

# Deploy manual e reproduzível: builda na ACR taggeando com o SHA do commit
# escolhido + latest, e reinicia o app na VM conferindo o digest. Disparo só
# manual (workflow_dispatch) — deploy não deve sair sozinho a cada push.
#
# Pré-requisitos (uma vez): federated credential (OIDC) para o repo e estes
# secrets no repositório:
#   AZURE_CLIENT_ID        (app registration com AcrPush no ACR + Contributor no RG)
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
# Sem eles o job falha no login — é o scaffold, não roda por acidente.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit/branch/tag a deployar"
        required: false
        default: "main"

permissions:
  id-token: write # OIDC login na Azure
  contents: read

# Nunca deixa dois deploys disputarem a tag latest ou reiniciarem a VM ao mesmo
# tempo. O segundo aguarda o primeiro em vez de cancelar um deploy em andamento.
concurrency:
  group: estudo-app-azure-production
  cancel-in-progress: false

env:
  ACR: k8slabacrb9ue3
  RG: k8slab-rg
  VM: k8slab-vm
  IMAGE: estudo-app
  APP_URL: ${{ secrets.APP_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: SHA curto
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login na Azure (OIDC, sem segredo de longa duração)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build na ACR (tag = SHA + latest)
        run: |
          az acr build --registry "$ACR" \
            --image "$IMAGE:${{ steps.sha.outputs.short }}" \
            --image "$IMAGE:latest" \
            --build-arg VERSION=${{ steps.sha.outputs.short }} .

      - name: Liga a VM se desalocada
        run: |
          power=$(az vm get-instance-view -g "$RG" -n "$VM" \
            --query "instanceView.statuses[?starts_with(code,'PowerState')].displayStatus" -o tsv)
          if [ "$power" != "VM running" ]; then az vm start -g "$RG" -n "$VM"; fi

      - name: Sincroniza runtime persistente da VM
        run: |
          out=$(az vm run-command invoke -g "$RG" -n "$VM" --command-id RunShellScript \
            --scripts @deploy/azure/sync-runtime.sh \
            --query "value[0].message" -o tsv)
          echo "$out"
          echo "$out" | grep -q "RUNTIME_SYNC_OK" || { echo "::error::runtime persistente nao foi sincronizado"; exit 1; }

      - name: Restart na VM + confere a imagem exata
        run: |
          out=$(az vm run-command invoke -g "$RG" -n "$VM" --command-id RunShellScript \
            --scripts "set -e; trap 'rm -f /run/lab-busy' EXIT; touch /run/lab-busy; az acr login --name $ACR >/dev/null; docker pull $ACR.azurecr.io/$IMAGE:${{ steps.sha.outputs.short }} >/dev/null; docker pull $ACR.azurecr.io/$IMAGE:latest >/dev/null; sha_id=\$(docker inspect --format '{{.Id}}' $ACR.azurecr.io/$IMAGE:${{ steps.sha.outputs.short }}); latest_id=\$(docker inspect --format '{{.Id}}' $ACR.azurecr.io/$IMAGE:latest); test \"\$sha_id\" = \"\$latest_id\"; systemctl restart estudo-app.service; sleep 10; got=\$(docker inspect --format '{{.Image}}' lab); test \"\$sha_id\" = \"\$got\"; echo MATCH \$got" \
            --query "value[0].message" -o tsv)
          echo "$out"
          echo "$out" | grep -q "MATCH" || { echo "::error::container nao roda a imagem do SHA solicitado"; exit 1; }

      - name: Confere modelos e configuracao real da VM
        run: |
          out=$(az vm run-command invoke -g "$RG" -n "$VM" --command-id RunShellScript \
            --scripts @deploy/azure/verify-runtime.sh \
            --query "value[0].message" -o tsv)
          echo "$out"
          echo "$out" | grep -q "RUNTIME_VERIFY_OK" || { echo "::error::runtime da VM divergiu da configuracao esperada"; exit 1; }

      - name: Smoke test do app publicado
        run: |
          test -n "$APP_URL" || { echo "::error::secret APP_URL ausente"; exit 1; }
          base="${APP_URL%/}"
          for i in $(seq 1 12); do
            health=$(curl --fail --silent --show-error "$base/healthz" || true)
            if echo "$health" | grep -q "ok ${{ steps.sha.outputs.short }}"; then break; fi
            [ "$i" -eq 12 ] && { echo "::error::healthz nao respondeu apos deploy"; exit 1; }
            sleep 5
          done
          curl --fail --silent --show-error --max-time 180 "$base/api/tutor/deploy-gate" > gate.json
          jq -e '.passed == true' gate.json >/dev/null || { cat gate.json; echo "::error::deploy gate remoto falhou"; exit 1; }
