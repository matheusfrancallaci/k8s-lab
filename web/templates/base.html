<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kubernetes study lab com labs práticos, quiz, tutor local e integração com cluster real.">
    <meta property="og:title" content="K8s Study Lab">
    <meta property="og:description" content="Ambiente de estudo para Kubernetes com labs práticos e tutor local.">
    <title>{{if .PageTitle}}{{.PageTitle}} · K8s Study Lab{{else}}K8s Study Lab{{end}}</title>
    <script>
        // Aplica o tema salvo ANTES do primeiro paint (evita flash)
        (function () {
            var t = null;
            try { t = localStorage.getItem('k8slab-theme'); } catch (e) {}
            if (t && t !== 'dark') document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    {{block "content" .}}{{end}}

    <!-- Theme switcher (global) -->
    <div class="theme-fab" id="theme-fab">
        <button class="theme-fab-btn" onclick="toggleThemePop(event)" aria-label="Mudar tema" title="Tema">
            <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32 1.41-1.41"/>
            </svg>
        </button>
        <div class="theme-pop" id="theme-pop">
            <p class="theme-pop-title">seu perfil</p>
            <div style="display:flex;gap:6px;padding:2px 10px 10px;">
                <input id="profile-name" placeholder="seu nome" maxlength="40"
                       style="flex:1;min-width:0;padding:7px 10px;border-radius:8px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:12px;outline:none;"
                       onkeydown="if(event.key==='Enter')saveProfile()">
                <button class="theme-opt" onclick="saveProfile()" style="flex:0 0 auto;justify-content:center;">salvar</button>
            </div>
            <p class="theme-pop-title">idioma · language</p>
            <div style="display:flex;gap:6px;padding:2px 10px 10px;">
                <button class="theme-opt" data-lang-opt="pt" onclick="setLang('pt')" style="flex:1;justify-content:center;">Português <span class="check">✓</span></button>
                <button class="theme-opt" data-lang-opt="en" onclick="setLang('en')" style="flex:1;justify-content:center;">English <span class="check">✓</span></button>
            </div>
            <p class="theme-pop-title">tema</p>
            <button class="theme-opt" data-theme-opt="dark" onclick="setTheme('dark')">
                <span class="swatches"><span class="sw" style="background:#050510;"></span><span class="sw" style="background:#818cf8;"></span><span class="sw" style="background:#eef0ff;"></span></span>
                Dark <span class="check">✓</span>
            </button>
            <button class="theme-opt" data-theme-opt="dimmed" onclick="setTheme('dimmed')">
                <span class="swatches"><span class="sw" style="background:#1c2128;"></span><span class="sw" style="background:#818cf8;"></span><span class="sw" style="background:#adbac7;"></span></span>
                Dark dimmed <span class="check">✓</span>
            </button>
            <button class="theme-opt" data-theme-opt="contrast" onclick="setTheme('contrast')">
                <span class="swatches"><span class="sw" style="background:#010409;"></span><span class="sw" style="background:#a5b4fc;"></span><span class="sw" style="background:#ffffff;"></span></span>
                High contrast <span class="check">✓</span>
            </button>
            <button class="theme-opt" data-theme-opt="light" onclick="setTheme('light')">
                <span class="swatches"><span class="sw" style="background:#ffffff;"></span><span class="sw" style="background:#4f46e5;"></span><span class="sw" style="background:#1f2328;"></span></span>
                Light <span class="check">✓</span>
            </button>
        </div>
    </div>
    <!-- Paleta de comandos (Ctrl+K) -->
    <div class="pal-overlay" id="pal-overlay" onclick="if(event.target===this)closePal()">
        <div class="pal">
            <input id="pal-input" placeholder="Para onde vamos? (páginas, labs, ações...)" oninput="palFilter()" onkeydown="palKey(event)">
            <div class="pal-list" id="pal-list"></div>
            <div class="pal-foot">↑↓ navega · Enter abre · Esc fecha</div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
