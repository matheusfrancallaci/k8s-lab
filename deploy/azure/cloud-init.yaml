#cloud-config
# Provisiona a VM: Docker + Azure CLI. Sobe o app (container completo app+k3s,
# interno) atrás de um Caddy que faz HTTPS automático (Let's Encrypt) para o FQDN.
package_update: true

write_files:
  - path: /opt/lab/Caddyfile
    permissions: '0644'
    content: |
      ${fqdn} {
        reverse_proxy lab:8080
      }

  - path: /opt/lab/run-lab.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      # A VM se autentica com a própria identidade (sem segredos).
      az login --identity >/dev/null
      echo "[lab] aguardando a imagem na ACR (rode 'az acr build' no seu PC se ainda nao rodou)..."
      until az acr login --name "${acr_name}" >/dev/null 2>&1 && docker pull "${image}" >/dev/null 2>&1; do
        sleep 20
      done
      docker network create labnet >/dev/null 2>&1 || true

      # App: container completo (k3s dentro -> --privileged), interno na rede labnet.
      docker rm -f lab >/dev/null 2>&1 || true
      docker run -d --privileged --restart=unless-stopped \
        --network labnet --name lab \
        -e APP_PASSWORD='${app_password}' \
        -v lab-data:/app/data \
        "${image}"

      # Caddy: HTTPS automático (Let's Encrypt) para o FQDN, proxy p/ o app.
      docker rm -f caddy >/dev/null 2>&1 || true
      docker run -d --restart=unless-stopped \
        --network labnet --name caddy \
        -p 80:80 -p 443:443 \
        -v /opt/lab/Caddyfile:/etc/caddy/Caddyfile:ro \
        -v caddy-data:/data -v caddy-config:/config \
        caddy:2
      echo "[lab] no ar: https://${fqdn}"

  - path: /etc/systemd/system/estudo-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=K8s Study Lab (app + k3s + caddy https)
      After=docker.service network-online.target
      Requires=docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      TimeoutStartSec=0
      ExecStart=/opt/lab/run-lab.sh

      [Install]
      WantedBy=multi-user.target

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash
  - systemctl daemon-reload
  - systemctl enable --now estudo-app.service
