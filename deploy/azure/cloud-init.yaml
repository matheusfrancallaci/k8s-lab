#cloud-config
# Provisiona a VM: Docker + Azure CLI. Sobe o app (container completo app+k3s,
# interno) atrás de um Caddy que faz HTTPS automático (Let's Encrypt) para o FQDN.
package_update: true

write_files:
  - path: /opt/lab/Caddyfile
    permissions: '0644'
    content: |
      ${fqdn} {
        reverse_proxy lab:8080
      }

  - path: /opt/lab/run-lab.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      # A VM se autentica com a própria identidade (sem segredos).
      az login --identity >/dev/null
      echo "[lab] aguardando a imagem na ACR (rode 'az acr build' no seu PC se ainda nao rodou)..."
      until az acr login --name "${acr_name}" >/dev/null 2>&1 && docker pull "${image}" >/dev/null 2>&1; do
        sleep 20
      done
      docker network create labnet >/dev/null 2>&1 || true

      # Tutor com IA local: Ollama como container (modelo roda em CPU na VM).
      # O app já fala com ele via OLLAMA_URL/OLLAMA_MODEL — sem mudar código.
      if [ -n "${ollama_model}" ] || [ -n "${ollama_embed_model}" ]; then
        docker rm -f ollama >/dev/null 2>&1 || true
        docker run -d --restart=unless-stopped \
          --network labnet --name ollama \
          -v ollama-data:/root/.ollama \
          ollama/ollama
      fi

      # App: container completo (k3s dentro -> --privileged), na rede labnet.
      # Porta publicada só no loopback (127.0.0.1) para o auto-stop consultar /api/idle.
      docker rm -f lab >/dev/null 2>&1 || true
      docker run -d --privileged --restart=unless-stopped \
        --network labnet --name lab \
        -p 127.0.0.1:8080:8080 \
        -e APP_PASSWORD='${app_password}' \
        -e LOG_FORMAT=json \
        -e COOKIE_SECURE=1 \
        -e AZURE_MANAGED_IDENTITY=1 \
        -e AZURE_RG='${rg_name}' \
        -e AZURE_REGION='${location}' \
        -e OLLAMA_URL='http://ollama:11434' \
        -e OLLAMA_MODEL='${ollama_model}' \
        -e OLLAMA_GEN_MODEL='qwen2.5-coder:3b' \
        -e OLLAMA_EMBED_MODEL='${ollama_embed_model}' \
        -v lab-data:/app/data \
        "${image}"

      # Caddy: HTTPS automático (Let's Encrypt) para o FQDN, proxy p/ o app.
      docker rm -f caddy >/dev/null 2>&1 || true
      docker run -d --restart=unless-stopped \
        --network labnet --name caddy \
        -p 80:80 -p 443:443 \
        -v /opt/lab/Caddyfile:/etc/caddy/Caddyfile:ro \
        -v caddy-data:/data -v caddy-config:/config \
        caddy:2
      echo "[lab] no ar: https://${fqdn}"

      # Baixa o modelo do tutor (alguns min na 1a vez; a IA fica disponível
      # assim que terminar — o app detecta sozinho em ~30s).
      if [ -n "${ollama_model}" ]; then
        echo "[lab] baixando modelo do tutor: ${ollama_model} (roda em background)"
        ( docker exec ollama ollama pull "${ollama_model}" >/var/log/ollama-pull.log 2>&1 || true ) &
      fi
      if [ -n "${ollama_embed_model}" ]; then
        echo "[lab] baixando modelo de embeddings: ${ollama_embed_model} (roda em background)"
        ( docker exec ollama ollama pull "${ollama_embed_model}" >/var/log/ollama-embed-pull.log 2>&1 || true ) &
      fi

  - path: /etc/systemd/system/estudo-app.service
    permissions: '0644'
    content: |
      [Unit]
      Description=K8s Study Lab (app + k3s + caddy https)
      After=docker.service network-online.target
      Requires=docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      TimeoutStartSec=0
      ExecStart=/opt/lab/run-lab.sh

      [Install]
      WantedBy=multi-user.target

  # ── Auto-stop: desaloca a VM quando ociosa (controle de custo) ──
  - path: /opt/lab/autostop.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      # threshold 0 = auto-stop desligado
      [ ${idle_threshold_seconds} -le 0 ] && exit 0
      # Lease de operacao (deploy/manutencao): /run/lab-busy segura a VM acordada.
      # Lease com mais de 30 min e ignorado — esquecer o arquivo nao trava a economia.
      if [ -f /run/lab-busy ] && [ $(( $(date +%s) - $(stat -c %Y /run/lab-busy) )) -lt 1800 ]; then
        logger "[autostop] lease /run/lab-busy ativo -> nao desaloca"
        exit 0
      fi
      data=$(curl -s --max-time 5 http://127.0.0.1:8080/api/idle || echo '{}')
      idle=$(echo "$data" | sed -n 's/.*"idle_seconds":\([0-9]*\).*/\1/p')
      terms=$(echo "$data" | sed -n 's/.*"active_terminals":\([0-9]*\).*/\1/p')
      [ -z "$idle" ] && idle=0
      [ -z "$terms" ] && terms=0
      if [ "$terms" -eq 0 ] && [ "$idle" -ge ${idle_threshold_seconds} ]; then
        logger "[autostop] ocioso ($idle s, sem terminais) -> desalocando a VM"
        az login --identity >/dev/null
        az vm deallocate --resource-group "${rg_name}" --name "${vm_name}" --no-wait
      fi

  - path: /etc/systemd/system/lab-autostop.service
    permissions: '0644'
    content: |
      [Unit]
      Description=K8s Study Lab - checa inatividade e desaloca a VM
      [Service]
      Type=oneshot
      ExecStart=/opt/lab/autostop.sh

  - path: /etc/systemd/system/lab-autostop.timer
    permissions: '0644'
    content: |
      [Unit]
      Description=K8s Study Lab - auto-stop por inatividade
      [Timer]
      OnBootSec=15min
      OnUnitActiveSec=5min
      [Install]
      WantedBy=timers.target

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - curl -sL https://aka.ms/InstallAzureCLIDeb | bash
  - systemctl daemon-reload
  - systemctl enable --now estudo-app.service
  - systemctl enable --now lab-autostop.timer
