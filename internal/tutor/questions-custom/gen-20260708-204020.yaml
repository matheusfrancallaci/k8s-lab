questions:
    - id: custom-ad552d78
      cert: CKA
      topic: ReplicaSet
      difficulty: mid
      type: lab
      question: |-
        Crie um ReplicaSet chamado **delta-gateway-rs** que mantenha **3 pods** com a label **app=delta-gateway** usando a imagem **busybox:1.35**.

        Resolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION.
      options: []
      answer: 0
      explanation: ReplicaSet garante que um conjunto de pods com labels compatíveis exista na quantidade desejada. Na prática, Deployments normalmente criam e gerenciam ReplicaSets, mas praticar o recurso diretamente ajuda a entender selectors e reconciliação.
      doc_url: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
      doc_section: Concepts -> Workloads -> ReplicaSet
      hint: ReplicaSet usa `spec.replicas`, `spec.selector.matchLabels` e `spec.template.metadata.labels`; selector e template precisam casar.
      answer_command: |-
        cat <<'EOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: ReplicaSet
        metadata:
          name: delta-gateway-rs
        spec:
          replicas: 3
          selector:
            matchLabels:
              app: delta-gateway
          template:
            metadata:
              labels:
                app: delta-gateway
            spec:
              containers:
              - name: app
                image: busybox:1.35
        EOF
      validation: null
      goals:
        - description: ReplicaSet **delta-gateway-rs** existe com selector `app=delta-gateway`
          hint: Confira se `spec.selector.matchLabels.app` e `spec.template.metadata.labels.app` possuem o mesmo valor.
          validation:
            command: kubectl get rs delta-gateway-rs -o jsonpath='{.spec.selector.matchLabels.app}:{.spec.template.metadata.labels.app}' 2>/dev/null
            expected_contains: delta-gateway:delta-gateway
            expected_output: ""
        - description: ReplicaSet mantém **3 pods prontos**
          hint: A quantidade desejada fica em `spec.replicas`; aguarde os pods ficarem Ready antes de validar.
          validation:
            command: kubectl get rs delta-gateway-rs -o jsonpath='{.status.readyReplicas}' 2>/dev/null
            expected_contains: "3"
            expected_output: ""
      setup: []
      teardown:
        - kubectl delete rs delta-gateway-rs --ignore-not-found=true
