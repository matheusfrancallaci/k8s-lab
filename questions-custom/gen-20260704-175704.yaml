    - id: custom-4950cead
      cert: CKA
      topic: Custom
      difficulty: mid
      type: lab
      question: |-
        Da documentação que você forneceu: crie o **NetworkPolicy/test-network-policy**.

        Dica: monte o YAML e aplique com `kubectl apply -f`.
      options: []
      answer: 0
      explanation: Manifest extraído da sua documentação. O kind NetworkPolicy foi criado de forma declarativa — compare o resultado (kubectl get -o yaml) com o manifest original.
      doc_url: ""
      doc_section: ""
      hint: |-
        kubectl apply -f - <<EOF
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: test-network-policy
          namespace: default
        spec:
          podSelector:
            matchLabels:
              role: db
          policyTypes:
          - Ingress
          - Egress
          ingress:
          - from:
            - ipBlock:
                cidr: 172.17.0.0/16
                except:
                - 172.17.1.0/24
            - namespaceSelector:
                matchLabels:
                  project: myproject
            - podSelector:
                matchLabels:
                  role: frontend
            ports:
            - protocol: TCP
              port: 6379
          egress:
          - to:
            - ipBlock:
                cidr: 10.0.0.0/24
            ports:
            - protocol: TCP
              port: 5978
        EOF
      answer_command: 'kubectl apply -f manifest.yaml  # NetworkPolicy/test-network-policy da documentação'
      validation: null
      goals:
        - description: '**NetworkPolicy/test-network-policy** existe no cluster'
          hint: kubectl apply -f com o manifest da doc.
          validation:
            command: kubectl get networkpolicy test-network-policy -o name 2>/dev/null
            expected_contains: test-network-policy
            expected_output: ""
      setup: []
      teardown:
        - kubectl delete networkpolicy test-network-policy --ignore-not-found=true
