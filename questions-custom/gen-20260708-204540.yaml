    - id: custom-9bdbd3a7
      cert: kcna
      topic: Autoscaling
      difficulty: mid
      type: lab
      question: |-
        Crie um HPA para o Deployment **pixel-worker**: **min=2**, **max=5**, **CPU 50%**.

        Foco do treino: **Autoscaling**.

        Resolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION.
      options: []
      answer: 0
      explanation: O HorizontalPodAutoscaler observa metricas do Metrics Server e altera o numero desejado de replicas do Deployment dentro dos limites min/max.
      doc_url: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
      doc_section: Tasks -> Horizontal Pod Autoscaling
      hint: 'Quebre a tarefa em passos pequenos: criar recurso, ajustar configuracao e validar os goals.'
      answer_command: kubectl autoscale deployment pixel-worker --name=pixel-worker-hpa --cpu-percent=50 --min=2 --max=5
      validation: null
      goals:
        - description: HPA **pixel-worker-hpa** aponta para o Deployment **pixel-worker**
          hint: kubectl autoscale deployment ... --name ...
          validation:
            command: kubectl get hpa pixel-worker-hpa -o jsonpath='{.spec.scaleTargetRef.name}:{.spec.minReplicas}:{.spec.maxReplicas}' 2>/dev/null
            expected_contains: pixel-worker:2:5
            expected_output: ""
        - description: HPA usa alvo de **50% CPU**
          hint: Confira o campo averageUtilization.
          validation:
            command: kubectl get hpa pixel-worker-hpa -o jsonpath='{.spec.metrics[0].resource.target.averageUtilization}' 2>/dev/null
            expected_contains: "50"
            expected_output: ""
      setup:
        - description: Instalando Metrics Server se necessario...
          command: kubectl get deploy metrics-server -n kube-system >/dev/null 2>&1 || kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml 2>&1 | tail -3; kubectl get deploy metrics-server -n kube-system -o jsonpath='{.spec.template.spec.containers[0].args}' 2>/dev/null | grep -q -- '--kubelet-insecure-tls' || kubectl patch deployment metrics-server -n kube-system --type=json -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]' 2>/dev/null || true; kubectl rollout status deployment/metrics-server -n kube-system --timeout=180s 2>/dev/null || true
        - description: Criando workload alvo pixel-worker com requests de CPU...
          command: kubectl create deployment pixel-worker --image=registry.k8s.io/hpa-example --port=80 2>/dev/null || true; kubectl set resources deployment/pixel-worker --requests=cpu=100m --limits=cpu=200m 2>/dev/null || true; kubectl rollout status deployment/pixel-worker --timeout=120s 2>/dev/null || true
      teardown:
        - kubectl delete hpa pixel-worker-hpa --ignore-not-found=true
        - kubectl delete deployment pixel-worker --ignore-not-found=true
      lab_spec:
        objective: Criar e validar autoscaling com HorizontalPodAutoscaler
