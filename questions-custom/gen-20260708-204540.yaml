      question: "\U0001F6A8 **INCIDENTE** — monitoramento alerta: **0 réplicas** respondendo para **lunar-auth**. Um deploy de sexta-feira deixou o serviço zerado.\n\nInvestigue e restaure **pelo menos 2 réplicas** saudáveis.\n\nFoco do treino: **Troubleshooting**.\n\nResolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION."
      options: []
      answer: 0
      explanation: Réplicas zeradas não geram pods com erro — o app simplesmente some. Por isso o diagnóstico começa em kubectl get deploy (READY 0/0), não em get pods. kubectl scale restaura; em produção, procure o autor no rollout history/auditoria.
      doc_url: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#scaling-a-deployment
      doc_section: Deployments → Scaling
      hint: kubectl get deploy — repare na coluna READY. Alguém mexeu no replicas...
      answer_command: kubectl scale deployment lunar-auth --replicas=2
      validation: null
      goals:
        - description: '**lunar-auth** com **2+ réplicas prontas** (serviço restaurado)'
          hint: ""
          validation:
            command: R=$(kubectl get deploy lunar-auth -o jsonpath='{.status.readyReplicas}' 2>/dev/null); [ "${R:-0}" -ge 2 ] && echo RECOVERED-$R || echo DOWN
            expected_contains: RECOVERED
            expected_output: ""
      setup:
        - description: Provisionando a aplicação...
          command: kubectl create deployment lunar-auth --image=nginx:1.21 --replicas=2 2>/dev/null || true
        - description: "\U0001F4A5 Injetando a falha..."
