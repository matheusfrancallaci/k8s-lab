    - id: custom-48f90dfe
      cert: kcna
      topic: ReplicaSet
      difficulty: mid
      type: lab
      question: |-
        Crie um ReplicaSet chamado **orion-cache-rs** que mantenha **2 pods** com a label **app=orion-cache** usando a imagem **busybox:1.35**.

        Resolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION.
      options: []
      answer: 0
      explanation: ReplicaSet garante que um conjunto de pods com labels compatíveis exista na quantidade desejada. Na prática, Deployments normalmente criam e gerenciam ReplicaSets, mas praticar o recurso diretamente ajuda a entender selectors e reconciliação.
      doc_url: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
      doc_section: Concepts -> Workloads -> ReplicaSet
      hint: ReplicaSet usa `spec.replicas`, `spec.selector.matchLabels` e `spec.template.metadata.labels`; selector e template precisam casar.
      answer_command: |-
        cat <<'EOF' | kubectl apply -f -
        apiVersion: apps/v1
        kind: ReplicaSet
        metadata:
          name: orion-cache-rs
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: orion-cache
          template:
            metadata:
              labels:
                app: orion-cache
            spec:
              containers:
              - name: app
                image: busybox:1.35
        EOF
      validation: null
      goals:
        - description: ReplicaSet **orion-cache-rs** existe com selector `app=orion-cache`
          hint: Confira se `spec.selector.matchLabels.app` e `spec.template.metadata.labels.app` possuem o mesmo valor.
          validation:
            command: kubectl get rs orion-cache-rs -o jsonpath='{.spec.selector.matchLabels.app}:{.spec.template.metadata.labels.app}' 2>/dev/null
            expected_contains: orion-cache:orion-cache
            expected_output: ""
        - description: ReplicaSet mantém **2 pods prontos**
          hint: A quantidade desejada fica em `spec.replicas`; aguarde os pods ficarem Ready antes de validar.
          validation:
            command: kubectl get rs orion-cache-rs -o jsonpath='{.status.readyReplicas}' 2>/dev/null
            expected_contains: "2"
            expected_output: ""
      setup: []
      teardown:
        - kubectl delete rs orion-cache-rs --ignore-not-found=true
      lab_spec:
        objective: Praticar ReplicaSet com comandos reais e validacao automatica
        scenario: Cenario hands-on para kcna em ReplicaSet.
