              kind: kubernetes
              install_action: preflight
              status_command: kubectl cluster-info
              required: true
        sources:
            - title: Concepts -> Workloads -> ReplicaSet
              url: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
              section: Concepts -> Workloads -> ReplicaSet
        evidence:
