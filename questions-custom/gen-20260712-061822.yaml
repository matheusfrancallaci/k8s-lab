      difficulty: easy
      type: lab
      source: generated
      question: |-
        Praticar Security com comandos reais e validacao automatica em um cenário prático de Security.

        Resolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION.
      options: []
      answer: 0
      explanation: 'RBAC em 3 peças: identidade (ServiceAccount), permissões (Role: verbos get/list sobre pods) e a ligação (RoleBinding). Sempre menor privilégio. ClusterRole/ClusterRoleBinding são o equivalente sem namespace. kubectl auth can-i --as=system:serviceaccount:<ns>:<sa> é o jeito rápido de auditar — cai MUITO em prova de CKS/CKA.'
      doc_url: https://kubernetes.io/docs/reference/access-authn-authz/rbac/
      doc_section: Reference → RBAC
      hint: kubectl create sa vega-gateway-sa; kubectl create role vega-gateway-reader --verb=get,list --resource=pods; kubectl create rolebinding vega-gateway-bind --role=vega-gateway-reader --serviceaccount=default:vega-gateway-sa
      answer_command: kubectl create sa vega-gateway-sa; kubectl create role vega-gateway-reader --verb=get --verb=list --resource=pods; kubectl create rolebinding vega-gateway-bind --role=vega-gateway-reader --serviceaccount=default:vega-gateway-sa
      validation: null
      goals:
        - description: Role **vega-gateway-reader** permite get/list de pods
          hint: kubectl create role vega-gateway-reader --verb=get --verb=list --resource=pods
          validation:
            command: kubectl get role vega-gateway-reader -o jsonpath='{.rules[0].verbs}' 2>/dev/null
            expected_contains: list
            expected_output: ""
        - description: SA **vega-gateway-sa** consegue listar pods (RBAC efetivo)
          hint: kubectl create rolebinding vega-gateway-bind --role=vega-gateway-reader --serviceaccount=default:vega-gateway-sa — valide com kubectl auth can-i.
          validation:
            command: kubectl auth can-i list pods --as=system:serviceaccount:default:vega-gateway-sa 2>/dev/null
            expected_contains: "yes"
            expected_output: ""
      setup: []
      teardown:
        - kubectl delete rolebinding vega-gateway-bind --ignore-not-found=true
        - kubectl delete role vega-gateway-reader --ignore-not-found=true
        - kubectl delete sa vega-gateway-sa --ignore-not-found=true
