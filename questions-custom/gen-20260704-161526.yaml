    - id: custom-33aac986
      cert: CKS
      topic: Custom
      difficulty: mid
      type: lab
      question: |-
        Da documentação que você forneceu: crie o **Pod/static-web**.

        Dica: monte o YAML e aplique com `kubectl apply -f`.
      options: []
      answer: 0
      explanation: Manifest extraído da sua documentação. O kind Pod foi criado de forma declarativa — compare o resultado (kubectl get -o yaml) com o manifest original.
      doc_url: ""
      doc_section: ""
      hint: |-
        kubectl apply -f - <<EOF
        # Run this command on the node where kubelet is running
        mkdir -p /etc/kubernetes/manifests/
        cat /etc/kubernetes/manifests/static-web.yaml
        apiVersion: v1
        kind: Pod
        metadata:
          name: static-web
          labels:
            role: myrole
        spec:
          containers:
            - name: web
              image: nginx
              ports:
                - name: web
                  containerPort: 80
                  protocol: TCP
        EOF
        EOF
      answer_command: 'kubectl apply -f manifest.yaml  # Pod/static-web da documentação'
      validation: null
      goals:
        - description: '**Pod/static-web** existe no cluster'
          hint: kubectl apply -f com o manifest da doc.
          validation:
            command: kubectl get pod static-web -o name 2>/dev/null
            expected_contains: static-web
            expected_output: ""
      setup: []
      teardown:
        - kubectl delete pod static-web --ignore-not-found=true
