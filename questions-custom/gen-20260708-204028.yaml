    - id: custom-cc38fe56
      cert: CKA
      topic: Troubleshooting
      difficulty: easy
      type: lab
      question: "\U0001F6A8 **INCIDENTE** — a aplicação **atlas-feed** está fora do ar: os pods não sobem.\n\nDiagnostique a causa e restaure o serviço. O Deployment deve ficar **Available** com a imagem **nginx:1.21**.\n\nFoco do treino: **Troubleshooting**.\n\nResolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION."
      options: []
      answer: 0
      explanation: 'Pods em ImagePullBackOff/ErrImagePull indicam imagem inexistente ou sem acesso. Diagnóstico: kubectl describe pod (Events) ou kubectl get deploy -o wide. Correção: kubectl set image (ou rollout undo). Sempre confirme com rollout status.'
      doc_url: https://kubernetes.io/docs/concepts/containers/images/
      doc_section: Concepts → Images
      hint: kubectl get pods → status dos pods; kubectl describe pod → Events contam a história.
      answer_command: kubectl set image deployment/atlas-feed nginx=nginx:1.21
      validation: null
      goals:
        - description: Deployment **atlas-feed** voltou a ficar **Available** com imagem válida
          hint: ""
          validation:
            command: kubectl get deploy atlas-feed -o jsonpath='{.spec.template.spec.containers[0].image}:{.status.conditions[?(@.type=="Available")].status}' 2>/dev/null
            expected_contains: nginx:1.21:True
            expected_output: ""
      setup:
        - description: Provisionando a aplicação...
          command: kubectl create deployment atlas-feed --image=nginx:1.21 --replicas=2 2>/dev/null || true
        - description: "\U0001F4A5 Injetando a falha..."
          command: kubectl set image deployment/atlas-feed nginx=nginx:INEXISTENTE_v99 2>/dev/null || true
      teardown:
        - kubectl delete deployment atlas-feed --ignore-not-found=true
      lab_spec:
