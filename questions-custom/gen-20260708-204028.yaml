    - id: custom-cbf7eadf
      cert: CKA
      topic: Troubleshooting
      difficulty: easy
      type: lab
      question: "\U0001F6A8 **INCIDENTE** — o serviço **lunar-batch-svc** não entrega tráfego: usuários reportam timeout.\n\nOs pods estão saudáveis. Encontre a desconexão e restaure os **endpoints** do Service.\n\nFoco do treino: **Troubleshooting**.\n\nResolva pelo terminal. Use a aba HINT se travar; o gabarito completo fica na aba SOLUTION."
      options: []
      answer: 0
      explanation: 'Endpoints vazios com pods saudáveis = selector não casa com as labels. É um dos incidentes mais comuns de prova e de produção. Diagnóstico: describe svc (Selector) vs get pods --show-labels; correção via kubectl patch/edit.'
      doc_url: https://kubernetes.io/docs/concepts/services-networking/service/
      doc_section: Services → Selectors
      hint: Compare o selector do Service com as labels reais dos pods (describe svc vs get pods --show-labels).
      answer_command: kubectl patch svc lunar-batch-svc -p '{"spec":{"selector":{"app":"lunar-cache"}}}'
      validation: null
      goals:
        - description: "\U0001F310 Service **lunar-batch-svc** com **endpoints ativos** (tráfego restaurado)"
          hint: ""
          validation:
            command: kubectl get endpoints lunar-batch-svc -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -qE '[0-9]' && echo RECOVERED || echo DOWN
            expected_contains: RECOVERED
            expected_output: ""
      setup:
        - description: Provisionando a aplicação...
          command: kubectl create deployment lunar-cache --image=nginx:1.21 --replicas=2 2>/dev/null || true; kubectl rollout status deployment/lunar-cache --timeout=90s 2>/dev/null || true
        - description: "\U0001F4A5 Injetando a falha..."
          command: kubectl create service clusterip lunar-batch-svc --tcp=80:80 2>/dev/null || true; kubectl set selector service lunar-batch-svc 'app=lunar-cache-QUEBRADO' 2>/dev/null || true
      teardown:
        - kubectl delete svc lunar-batch-svc --ignore-not-found=true
        - kubectl delete deployment lunar-cache --ignore-not-found=true
      lab_spec:
        objective: Praticar Troubleshooting com comandos reais e validacao automatica
