      difficulty: mid
      type: multiple_choice
      question: Qual é o termo usado para descrever a capacidade de um cluster de Kubernetes de se recuperar automaticamente após uma falha?
      options:
        - High Availability
        - Load Balancing
        - Autoscaling
        - Self-healing
      answer: 3
      explanation: |-
        O termo 'self-healing' é usado para descrever a capacidade do cluster de se recuperar automaticamente após uma falha, garantindo que as aplicações permaneçam disponíveis.

