      type: multiple_choice
      question: Qual é o comando para criar uma rede de serviço no Kubernetes?
      options:
        - kubectl create service
        - kubectl expose pod
        - kubectl apply -f
        - kubectl get svc
      answer: 3
      explanation: |-
        O comando corretto é 'kubectl apply -f' quando se está trabalhando com um arquivo YAML ou JSON que define a rede de serviço.

