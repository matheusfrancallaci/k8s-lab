      - "kubectl create np allow-from-frontend -n backend --ingress=team=frontend/app=frontend:8080"
    answer: 0
    hint: |
      1. kubectl create namespace backend && kubectl label namespace backend team=backend
      2. kubectl create namespace frontend && kubectl label namespace frontend team=frontend
      3. Crie o YAML da NetworkPolicy com namespaceSelector + podSelector
    answer_command: "kubectl apply -f allow-from-frontend-policy.yaml"
    setup:
      - description: "Criando namespace backend..."
        command: "kubectl create namespace backend 2>/dev/null || true"
      - description: "Adicionando label team=backend..."
        command: "kubectl label namespace backend team=backend --overwrite 2>/dev/null || true"
      - description: "Criando namespace frontend..."
        command: "kubectl create namespace frontend 2>/dev/null || true"
      - description: "Adicionando label team=frontend..."
        command: "kubectl label namespace frontend team=frontend --overwrite 2>/dev/null || true"
    goals:
      - description: "Namespace **backend** tem label **team=backend**"
        hint: "kubectl label namespace backend team=backend"
        validation:
          command: "kubectl get namespace backend -o jsonpath='{.metadata.labels.team}' 2>/dev/null"
          expected_contains: "backend"
      - description: "NetworkPolicy **allow-from-frontend** existe no namespace **backend**"
        hint: "Crie via YAML com namespaceSelector e podSelector"
        validation:
          command: "kubectl get networkpolicy allow-from-frontend -n backend -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "allow-from-frontend"
      - description: "Policy filtra por namespace com label **team=frontend**"
        validation:
          command: "kubectl get networkpolicy allow-from-frontend -n backend -o jsonpath='{.spec.ingress[0].from[0].namespaceSelector}' 2>/dev/null"
          expected_contains: "frontend"
    teardown:
      - "kubectl delete networkpolicy allow-from-frontend -n backend --ignore-not-found=true"
      - "kubectl delete namespace backend --ignore-not-found=true"
      - "kubectl delete namespace frontend --ignore-not-found=true"
    explanation: "namespaceSelector + podSelector no mesmo elemento 'from' são AND (namespace E label do pod). Para OR: use elementos separados na lista from[]. O namespace deve ter o label para que namespaceSelector funcione. Rotule namespaces antecipadamente em clusters reais."
    doc_url: "https://kubernetes.io/docs/concepts/services-networking/network-policies/#networkpolicy-with-podnamespaceselectors"
    doc_section: "Concepts → Network Policies → Pod and Namespace Selectors"

  - id: cks-lab-040
    cert: CKS
    topic: Minimizing Microservice Vulnerabilities
    difficulty: hard
    type: lab
    question: "Crie um Pod **immutable-pod** (busybox, sleep 3600) com securityContext totalmente restritivo: runAsUser=65534, runAsGroup=65534, fsGroup=65534, readOnlyRootFilesystem=true, allowPrivilegeEscalation=false, capabilities.drop=[ALL], seccompProfile.type=RuntimeDefault."
    options:
      - "kubectl run immutable-pod --image=busybox --security-context=all-restricted -- sleep 3600"
      - "Criar via YAML com todos os campos de securityContext no nível do pod e do container"
      - "kubectl create pod immutable-pod --image=busybox --restricted"
      - "kubectl run immutable-pod --image=busybox --no-root --no-caps -- sleep 3600"
    answer: 1
    hint: |
      Crie o YAML com securityContext em dois níveis:
      Pod-level: runAsUser, runAsGroup, fsGroup, seccompProfile
      Container-level: readOnlyRootFilesystem, allowPrivilegeEscalation, capabilities.drop
      Use UID 65534 (nobody) que existe no busybox.
    answer_command: "kubectl apply -f immutable-pod.yaml"
    goals:
      - description: "Pod **immutable-pod** existe e está Running"
        hint: "Crie via YAML com todos os campos de securityContext"
        validation:
          command: "kubectl get pod immutable-pod -o jsonpath='{.status.phase}' 2>/dev/null"
          expected_contains: "Running"
      - description: "runAsUser está configurado (não root)"
        validation:
          command: "kubectl get pod immutable-pod -o jsonpath='{.spec.securityContext.runAsUser}' 2>/dev/null"
          expected_contains: "65534"
      - description: "readOnlyRootFilesystem está habilitado"
        validation:
          command: "kubectl get pod immutable-pod -o jsonpath='{.spec.containers[0].securityContext.readOnlyRootFilesystem}' 2>/dev/null"
          expected_contains: "true"
      - description: "allowPrivilegeEscalation está desabilitado"
        validation:
          command: "kubectl get pod immutable-pod -o jsonpath='{.spec.containers[0].securityContext.allowPrivilegeEscalation}' 2>/dev/null"
          expected_contains: "false"
    teardown:
      - "kubectl delete pod immutable-pod --ignore-not-found=true"
    explanation: "Container imutável segue o perfil 'restricted' do Pod Security Standards: sem root, sem escrita no FS, sem privilege escalation, sem capabilities extras, com seccomp RuntimeDefault. UID 65534 (nobody) é convencional para processos sem privilégios."
    doc_url: "https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted"
    doc_section: "Concepts → Security → Pod Security Standards → Restricted"
