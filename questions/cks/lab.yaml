questions:
  # ── EASY: Cluster Hardening ───────────────────────────────
  - id: cks-lab-001
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Crie um Role **pod-reader** no namespace **default** que permita apenas **get** e **list** em **pods**."
    options:
      - "kubectl create role pod-reader --verb=get,list --resource=pods"
      - "kubectl create clusterrole pod-reader --verb=get,list --resource=pods"
      - "kubectl apply role pod-reader --permissions=get,list --on=pods"
      - "kubectl create role pod-reader --actions=get,list --kind=pods"
    answer: 0
    answer_command: "kubectl create role pod-reader --verb=get,list --resource=pods"
    validation:
      command: "kubectl get role pod-reader -o jsonpath='{.rules[0].verbs}'"
      expected_contains: "get"
    teardown:
      - "kubectl delete role pod-reader --ignore-not-found=true"
    explanation: "O princípio do menor privilégio (PoLP) é fundamental em CKS. Roles têm escopo de namespace. ClusterRoles têm escopo de cluster. Sempre conceda apenas os verbos e recursos necessários — nunca use wildcards ('*') em produção."
    doc_url: "https://kubernetes.io/docs/reference/access-authn-authz/rbac/"
    doc_section: "Reference → RBAC"

  - id: cks-lab-002
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Crie uma ServiceAccount **minimal-sa** no namespace **production** com automount de token **desabilitado**."
    options:
      - "kubectl create sa minimal-sa -n production --no-token"
      - "kubectl create sa minimal-sa -n production e depois kubectl patch sa minimal-sa -p '{\"automountServiceAccountToken\":false}' -n production"
      - "kubectl create sa minimal-sa -n production --automount=false"
      - "kubectl create sa minimal-sa -n production --disable-token"
    answer: 1
    answer_command: "kubectl create sa minimal-sa -n production && kubectl patch sa minimal-sa -p '{\"automountServiceAccountToken\":false}' -n production"
    setup:
      - description: "Criando namespace production..."
        command: "kubectl create namespace production 2>/dev/null || true"
    goals:
      - description: "ServiceAccount **minimal-sa** existe no namespace **production**"
        hint: "kubectl create sa minimal-sa -n production"
        validation:
          command: "kubectl get sa minimal-sa -n production -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "minimal-sa"
      - description: "automountServiceAccountToken está **false**"
        hint: "kubectl patch sa minimal-sa -n production -p '{\"automountServiceAccountToken\":false}'"
        validation:
          command: "kubectl get sa minimal-sa -n production -o jsonpath='{.automountServiceAccountToken}' 2>/dev/null"
          expected_contains: "false"
    teardown:
      - "kubectl delete sa minimal-sa -n production --ignore-not-found=true"
    explanation: "automountServiceAccountToken: false impede que o token da SA seja montado automaticamente nos pods — reduz a superfície de ataque se o pod for comprometido. Por padrão é true. Pode ser desabilitado na SA ou no Pod spec."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#opt-out-of-api-credential-automounting"
    doc_section: "Tasks → Configure Pod → Service Account → Opt-out automount"

  - id: cks-lab-003
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Verifique se o usuário **developer** tem permissão para criar deployments no namespace **prod**."
    options:
      - "kubectl get rbac --user=developer -n prod"
      - "kubectl auth can-i create deployments --as=developer -n prod"
      - "kubectl describe role --user=developer -n prod"
      - "kubectl check auth developer deployments create -n prod"
    answer: 1
    answer_command: "kubectl auth can-i create deployments --as=developer -n prod"
    explanation: "kubectl auth can-i verifica permissões sem necessitar das credenciais do usuário. --as impersona o sujeito. Para listar todas as permissões: kubectl auth can-i --list --as=developer -n prod. Útil para auditoria de RBAC."
    doc_url: "https://kubernetes.io/docs/reference/access-authn-authz/authorization/#checking-api-access"
    doc_section: "Reference → Authorization → Checking API Access"

  - id: cks-lab-004
    cert: CKS
    topic: Minimizing Microservice Vulnerabilities
    difficulty: easy
    type: lab
    question: "Execute um pod com **securityContext** que proíba execução como root e adicione apenas a capability **NET_BIND_SERVICE**."
    options:
      - "kubectl run secure --image=nginx --security=no-root --cap-add=NET_BIND_SERVICE"
      - "Criar via YAML com securityContext.runAsNonRoot: true e securityContext.capabilities.add: [NET_BIND_SERVICE] e capabilities.drop: [ALL]"
      - "kubectl run secure --image=nginx --no-root --capabilities=NET_BIND_SERVICE"
      - "kubectl create pod secure --image=nginx --cap=NET_BIND_SERVICE --no-root"
    answer: 1
    answer_command: "kubectl apply -f secure-pod.yaml"
    explanation: "Drop ALL e add apenas o necessário é a prática recomendada (PoLP). NET_BIND_SERVICE permite binding em portas < 1024. Capabilities são recursos do Linux Kernel que substituem o modelo todo-ou-nada do root. runAsNonRoot força UID != 0."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-capabilities-for-a-container"
    doc_section: "Tasks → Configure Pod → Security Context → Capabilities"

  - id: cks-lab-005
    cert: CKS
    topic: Minimizing Microservice Vulnerabilities
    difficulty: easy
    type: lab
    question: "Crie um pod com **readOnlyRootFilesystem: true** e monte um emptyDir em **/tmp** para permitir escrita temporária."
    options:
      - "kubectl run ro-pod --image=nginx --read-only --tmpdir=/tmp"
      - "Criar via YAML: securityContext.readOnlyRootFilesystem: true + volume emptyDir montado em /tmp"
      - "kubectl create pod ro-pod --image=nginx --no-write --write-tmpdir=/tmp"
      - "kubectl annotate pod ro-pod readOnly=true tmpdir=/tmp"
    answer: 1
    answer_command: "kubectl apply -f readonly-pod.yaml"
    explanation: "readOnlyRootFilesystem impede modificações no filesystem do container — proteção contra ataques que tentam alterar binários ou criar arquivos. Monte emptyDir nos diretórios que precisam de escrita (/tmp, /var/run). nginx precisa de /var/cache/nginx e /run montados."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/security-context/"
    doc_section: "Tasks → Configure Pod → Security Context"

  - id: cks-lab-006
    cert: CKS
    topic: Supply Chain Security
    difficulty: easy
    type: lab
    question: "Qual prática de segurança é mais importante ao escolher imagens de container para produção?"
    options:
      - "Usar sempre a tag :latest para ter as correções mais recentes automaticamente"
      - "Usar imagens baseadas em distroless ou scratch com tags SHA256 pinadas"
      - "Usar imagens do Docker Hub sem restrições de pull rate limit"
      - "Fazer pull de imagens direto do Dockerfile sem usar registries privados"
    answer: 1
    answer_command: "kubectl run app --image=gcr.io/distroless/static@sha256:<digest>"
    explanation: "Imagens distroless/scratch minimizam a superfície de ataque (sem shell, sem package manager). Tags SHA256 garantem imutabilidade (ao contrário de tags mutáveis como :latest ou :1.21). Use um registry privado com scanning de vulnerabilidades (Trivy, Grype)."
    doc_url: "https://kubernetes.io/docs/concepts/security/pod-security-standards/"
    doc_section: "Concepts → Security → Pod Security Standards"

  - id: cks-lab-007
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Audit Log: qual flag do API Server ativa o audit logging e especifica o arquivo de policy?"
    options:
      - "--enable-audit=true --audit-log-path=/var/log/audit.log"
      - "--audit-policy-file=/etc/kubernetes/audit-policy.yaml --audit-log-path=/var/log/audit/audit.log"
      - "--audit=true --policy=/etc/kubernetes/audit-policy.yaml"
      - "--logging-audit-policy=/etc/kubernetes/audit-policy.yaml"
    answer: 1
    answer_command: "# Editar /etc/kubernetes/manifests/kube-apiserver.yaml e adicionar as flags"
    explanation: "O API Server suporta audit logging com --audit-policy-file (define quais eventos logar) e --audit-log-path (onde salvar). Flags adicionais: --audit-log-maxage, --audit-log-maxbackup, --audit-log-maxsize. A policy define regras de nível: None, Metadata, Request, RequestResponse."
    doc_url: "https://kubernetes.io/docs/tasks/debug/debug-cluster/audit/"
    doc_section: "Tasks → Debug → Audit"

  - id: cks-lab-008
    cert: CKS
    topic: Network Security
    difficulty: easy
    type: lab
    question: "Crie uma NetworkPolicy **default-deny-ingress** no namespace **default** que bloqueie todo o tráfego de entrada para todos os pods."
    options:
      - "kubectl create networkpolicy default-deny-ingress --deny-all"
      - "Criar via YAML: spec.podSelector: {} (todos os pods), spec.policyTypes: [Ingress], sem regras ingress"
      - "kubectl annotate namespace default deny=all-ingress"
      - "kubectl taint namespace default ingress=blocked:NoSchedule"
    answer: 1
    hint: |
      NetworkPolicy via YAML:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata: {name: default-deny-ingress}
        spec:
          podSelector: {}
          policyTypes: [Ingress]
    answer_command: "kubectl apply -f default-deny-ingress.yaml"
    goals:
      - description: "NetworkPolicy **default-deny-ingress** existe no namespace **default**"
        hint: "Crie o YAML com podSelector: {} e policyTypes: [Ingress] sem regras ingress"
        validation:
          command: "kubectl get networkpolicy default-deny-ingress -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "default-deny-ingress"
      - description: "Policy aplica-se a **todos os pods** (podSelector vazio)"
        validation:
          command: "kubectl get networkpolicy default-deny-ingress -o jsonpath='{.spec.podSelector}' 2>/dev/null"
          expected_contains: "{}"
      - description: "policyTypes inclui **Ingress**"
        validation:
          command: "kubectl get networkpolicy default-deny-ingress -o jsonpath='{.spec.policyTypes[0]}' 2>/dev/null"
          expected_contains: "Ingress"
    teardown:
      - "kubectl delete networkpolicy default-deny-ingress --ignore-not-found=true"
    explanation: "podSelector: {} seleciona TODOS os pods no namespace. policyTypes: [Ingress] sem regras de ingress = deny all ingress. Aplique primeiro, depois adicione NetworkPolicies específicas para tráfego permitido. Requer CNI com suporte (Calico, Cilium, Weave)."
    doc_url: "https://kubernetes.io/docs/concepts/services-networking/network-policies/#default-deny-all-ingress-traffic"
    doc_section: "Concepts → Network Policies → Default Deny"

  - id: cks-lab-009
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Visualize os certificados do cluster kubeadm e suas datas de expiração."
    options:
      - "kubectl get certificates -n kube-system"
      - "kubeadm certs check-expiration"
      - "openssl x509 -in /etc/kubernetes/pki/apiserver.crt -noout -dates"
      - "B e C estão corretos"
    answer: 3
    answer_command: "kubeadm certs check-expiration"
    explanation: "kubeadm certs check-expiration lista todos os certificados gerenciados pelo kubeadm. Para verificar certificados individuais: openssl x509 -in <cert.crt> -noout -enddate. Certificados expiram em 1 ano por padrão. Renove com: kubeadm certs renew all."
    doc_url: "https://kubernetes.io/docs/tasks/administer-cluster/kubeadm/kubeadm-certs/"
    doc_section: "Tasks → Administer → kubeadm → Certificates"

  - id: cks-lab-010
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Restrinja o acesso anônimo ao API Server. Qual flag do kube-apiserver desabilita o acesso anônimo?"
    options:
      - "--disable-anonymous=true"
      - "--anonymous-auth=false"
      - "--no-anonymous-access=true"
      - "--require-auth=true"
    answer: 1
    answer_command: "# Editar /etc/kubernetes/manifests/kube-apiserver.yaml: --anonymous-auth=false"
    explanation: "--anonymous-auth=false desabilita requisições não autenticadas ao API Server. Por padrão é true (permite acesso anônimo a alguns endpoints como /healthz). Após desabilitar, /healthz pode precisar de autenticação — use --anonymous-auth-exempt-prefixes ou LoadBalancer health check alternativo."
    doc_url: "https://kubernetes.io/docs/reference/access-authn-authz/authentication/#anonymous-requests"
    doc_section: "Reference → Authentication → Anonymous Requests"

  - id: cks-lab-011
    cert: CKS
    topic: Minimizing Microservice Vulnerabilities
    difficulty: easy
    type: lab
    question: "Verifique vulnerabilidades conhecidas em uma imagem Docker usando **Trivy** antes de fazer deploy."
    options:
      - "docker scan --security nginx:1.21"
      - "trivy image nginx:1.21"
      - "kubectl scan image nginx:1.21 --check-cves"
      - "kubeadm verify image nginx:1.21"
    answer: 1
    answer_command: "trivy image nginx:1.21"
    explanation: "Trivy é um scanner de vulnerabilidades open-source da Aqua Security. Verifica CVEs no OS, linguagens e dependências. Use em CI/CD antes de push. trivy image --exit-code 1 --severity HIGH,CRITICAL falha o build se encontrar vulnerabilidades críticas."
    doc_url: "https://aquasecurity.github.io/trivy/"
    doc_section: "Supply Chain Security → Image Scanning"

  - id: cks-lab-012
    cert: CKS
    topic: Supply Chain Security
    difficulty: easy
    type: lab
    question: "Configure um **ImagePullPolicy: Always** para garantir que imagens sejam sempre verificadas no registry. Em qual campo da spec do container isso é definido?"
    options:
      - "spec.containers[].pullPolicy: Always"
      - "spec.containers[].imagePullPolicy: Always"
      - "spec.imagePullPolicy: Always"
      - "spec.containers[].image.policy: Always"
    answer: 1
    answer_command: "kubectl set image deployment/app container=nginx:latest && kubectl patch deployment app -p '{\"spec\":{\"template\":{\"spec\":{\"containers\":[{\"name\":\"container\",\"imagePullPolicy\":\"Always\"}]}}}}'"
    explanation: "imagePullPolicy: Always garante pull do registry a cada restart (verifica digest). :latest tag usa Always por padrão. Tags específicas (nginx:1.21) usam IfNotPresent por padrão (usa cache local). Em CKS, Always garante que imagens comprometidas no cache sejam detectadas."
    doc_url: "https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy"
    doc_section: "Concepts → Containers → Images → Pull Policy"

  - id: cks-lab-013
    cert: CKS
    topic: Cluster Hardening
    difficulty: easy
    type: lab
    question: "Liste todos os ClusterRoleBindings que referenciam usuários (subjects com kind=User) no cluster."
    options:
      - "kubectl get clusterrolebindings --subjects-type=User"
      - "kubectl get clusterrolebindings -o json | jq '.items[] | select(.subjects[]?.kind==\"User\")'"
      - "kubectl describe clusterrolebindings | grep -A2 'User'"
      - "B ou C estão corretos"
    answer: 1
    answer_command: "kubectl get clusterrolebindings -o json | jq '.items[] | select(.subjects[]?.kind==\"User\") | .metadata.name'"
    explanation: "kubectl não tem filtro nativo para subjects — é necessário usar jq ou -o jsonpath para filtrar. Auditoria de RBAC é essencial no CKS: identifique bindings desnecessários, especialmente os que concedem cluster-admin. Remova usuários que não precisam de acesso."
    doc_url: "https://kubernetes.io/docs/reference/access-authn-authz/rbac/#referring-to-subjects"
    doc_section: "Reference → RBAC → Subjects"

  - id: cks-lab-014
    cert: CKS
    topic: Network Security
    difficulty: easy
    type: lab
    question: "Crie uma NetworkPolicy que permita tráfego de saída (egress) apenas para o namespace **database** na porta **5432** para os pods com label **tier=backend**."
    options:
      - "kubectl create networkpolicy backend-egress --pod-selector=tier=backend --egress-to=namespace:database --port=5432"
      - "Criar via YAML: podSelector={tier:backend}, policyTypes:[Egress], egress:[{to:[{namespaceSelector:{match:database}}], ports:[{port:5432}]}]"
      - "kubectl annotate pods -l tier=backend egress=database:5432"
      - "kubectl taint namespace backend egress=database:5432:NoSchedule"
    answer: 1
    answer_command: "kubectl apply -f backend-egress-policy.yaml"
    explanation: "policyTypes: [Egress] sem regras = bloqueia todo egress. Com regras egress, apenas o tráfego especificado é permitido. Para permitir DNS (53/UDP) junto: adicione outra regra egress para kube-dns. namespaceSelector seleciona o namespace destino."
    doc_url: "https://kubernetes.io/docs/concepts/services-networking/network-policies/#the-networkpolicy-resource"
    doc_section: "Concepts → Network Policies"

  - id: cks-lab-015
    cert: CKS
    topic: Cluster Setup
    difficulty: easy
    type: lab
    question: "Verifique o benchmark CIS para a configuração atual do kube-apiserver usando **kube-bench**."
    options:
      - "kubectl bench --cis kube-apiserver"
      - "kube-bench run --targets apiserver"
      - "kubeadm audit --cis"
      - "kube-bench --check apiserver"
    answer: 1
    answer_command: "kube-bench run --targets apiserver"
    explanation: "kube-bench verifica a conformidade com o CIS Kubernetes Benchmark. Flags principais: --targets (apiserver, node, etcd, policies). Executa como Job no cluster: kubectl apply -f https://raw.githubusercontent.com/aquasecurity/kube-bench/main/job.yaml. Analise as falhas [FAIL] e [WARN]."
    doc_url: "https://github.com/aquasecurity/kube-bench"
    doc_section: "Supply Chain Security → CIS Benchmark"

  # ── MID: Cluster Hardening & Runtime Security ─────────────
  - id: cks-lab-016
    cert: CKS
    topic: System Hardening
    difficulty: mid
    type: lab
    question: "Configure um perfil **seccomp** restritivo (RuntimeDefault) para um pod. Qual campo e valor usar na spec do pod?"
    options:
      - "spec.securityContext.seccompProfile.type: RuntimeDefault"
      - "kubectl annotate pod <name> seccomp.security.alpha.kubernetes.io/pod=runtime/default"
      - "spec.containers[].securityContext.seccompProfile: runtime/default"
      - "A e B ambas são formas válidas (A é a moderna, B é a deprecated)"
    answer: 0
    answer_command: "kubectl apply -f seccomp-pod.yaml"
    explanation: "seccompProfile.type: RuntimeDefault usa o perfil seccomp padrão do container runtime (Docker/containerd), que bloqueia syscalls perigosas. Alternativas: Unconfined (sem restrições — não recomendado), Localhost (perfil customizado). A anotação beta foi depreciada no K8s 1.19."
    doc_url: "https://kubernetes.io/docs/tutorials/security/seccomp/"
    doc_section: "Tutorials → Security → Seccomp"

  - id: cks-lab-017
    cert: CKS
    topic: System Hardening
    difficulty: mid
    type: lab
    question: "Aplique um perfil **AppArmor** ao container **web** de um pod existente. Qual é o campo de annotation correto (K8s < 1.30)?"
    options:
      - "spec.containers[].securityContext.appArmorProfile.type: RuntimeDefault"
      - "container.apparmor.security.beta.kubernetes.io/<container-name>: localhost/<profile-name>"
      - "spec.securityContext.appArmor: <profile-name>"
      - "kubectl annotate pod <name> apparmor=<profile-name>"
    answer: 1
    answer_command: "kubectl annotate pod <name> container.apparmor.security.beta.kubernetes.io/web=localhost/custom-profile"
    explanation: "AppArmor é aplicado via annotation no Pod (pré-K8s 1.30). O perfil deve estar carregado no nó (apparmor_parser -r profile). No K8s 1.30+: spec.containers[].securityContext.appArmorProfile. Perfis: runtime/default (padrão runtime), localhost/<name> (customizado), unconfined."
    doc_url: "https://kubernetes.io/docs/tutorials/security/apparmor/"
    doc_section: "Tutorials → Security → AppArmor"

  - id: cks-lab-018
    cert: CKS
    topic: Cluster Hardening
    difficulty: mid
    type: lab
    question: "Identifique todas as ServiceAccounts com permissões de cluster-admin (via ClusterRoleBinding). Qual comando usar?"
    options:
      - "kubectl get sa --with-role=cluster-admin"
      - "kubectl get clusterrolebindings -o json | jq '.items[] | select(.roleRef.name==\"cluster-admin\") | .subjects'"
      - "kubectl auth can-i --list --as=system:serviceaccount:default:default"
      - "kubectl describe clusterrole cluster-admin"
    answer: 1
    answer_command: "kubectl get clusterrolebindings -o json | jq '.items[] | select(.roleRef.name==\"cluster-admin\") | {binding: .metadata.name, subjects: .subjects}'"
    explanation: "Identificar SAs com cluster-admin é crítico para CKS. cluster-admin concede acesso irrestrito ao cluster. SAs com cluster-admin comprometidas = comprometimento total do cluster. Substitua por ClusterRoles específicas com PoLP."
    doc_url: "https://kubernetes.io/docs/reference/access-authn-authz/rbac/#user-facing-roles"
    doc_section: "Reference → RBAC → User-Facing Roles"

  - id: cks-lab-019
    cert: CKS
    topic: Runtime Security
    difficulty: mid
    type: lab
    question: "O **Falco** detectou atividade suspeita em um pod. Como verificar os alertas do Falco em tempo real?"
    options:
      - "kubectl logs -n falco -l app=falco -f"
      - "kubectl get alerts --from=falco"
      - "kubectl describe pod falco -n falco"
      - "kubectl exec -n falco falco-pod -- falco --list-alerts"
    answer: 0
    answer_command: "kubectl logs -n falco -l app=falco -f"
    explanation: "Falco é um runtime security tool que detecta anomalias baseado em syscalls. Alertas vão para stdout → visíveis via kubectl logs. Também pode enviar para Slack, syslog, gRPC. Regras customizadas em /etc/falco/falco_rules.yaml. Prioridades: ERROR, WARNING, NOTICE, INFO, DEBUG."
    doc_url: "https://falco.org/docs/"
    doc_section: "Runtime Security → Falco"

  - id: cks-lab-020
    cert: CKS
    topic: Cluster Hardening
    difficulty: mid
    type: lab
    question: "Restrinja a criação de pods privilegiados no namespace **secured** usando **Pod Security Admission** no nível **restricted**."
    options:
      - "kubectl label namespace secured security=restricted"
      - "kubectl label namespace secured pod-security.kubernetes.io/enforce=restricted"
      - "kubectl annotate namespace secured pod-security=restricted"
      - "kubectl taint namespace secured privileged=denied:NoSchedule"
    answer: 1
    answer_command: "kubectl label namespace secured pod-security.kubernetes.io/enforce=restricted"
    setup:
      - description: "Criando namespace secured..."
        command: "kubectl create namespace secured 2>/dev/null || true"
    goals:
      - description: "Namespace **secured** existe"
        hint: "kubectl create namespace secured"
        validation:
          command: "kubectl get namespace secured -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "secured"
      - description: "Label **pod-security.kubernetes.io/enforce=restricted** aplicado"
        hint: "kubectl label namespace secured pod-security.kubernetes.io/enforce=restricted"
        validation:
          command: "kubectl get namespace secured -o jsonpath='{.metadata.labels.pod-security\\.kubernetes\\.io/enforce}' 2>/dev/null"
          expected_contains: "restricted"
    teardown:
      - "kubectl delete namespace secured --ignore-not-found=true"
    explanation: "Pod Security Admission (PSA) substituiu PodSecurityPolicy no K8s 1.25. Labels: pod-security.kubernetes.io/enforce (bloqueia), /warn (avisa), /audit (loga). Níveis: privileged (sem restrição), baseline (previne escaladas), restricted (hardened, segue melhores práticas)."
    doc_url: "https://kubernetes.io/docs/concepts/security/pod-security-admission/"
    doc_section: "Concepts → Security → Pod Security Admission"

  - id: cks-lab-021
    cert: CKS
    topic: Supply Chain Security
    difficulty: mid
    type: lab
    question: "Configure um **Admission Webhook** (OPA/Gatekeeper) para bloquear pods com imagens sem digest SHA256. Qual recurso do Gatekeeper define a política?"
    options:
      - "NetworkPolicy com selector de imagem"
      - "ConstraintTemplate (define a política em Rego) + Constraint (aplica a política)"
