questions:
  # ── EASY: Application Design & Build ─────────────────────
  - id: ckad-lab-001
    cert: CKAD
    topic: Application Design
    difficulty: easy
    type: lab
    question: "Crie um Pod **multi-container** chamado **sidecar-pod** com dois containers: **app** (nginx:1.21) e **sidecar** (busybox) que execute **sleep 3600**."
    options:
      - "kubectl run sidecar-pod --image=nginx:1.21 --image=busybox -- sleep 3600"
      - "Criar via YAML com spec.containers[] listando app (nginx:1.21) e sidecar (busybox + sleep 3600)"
      - "kubectl create pod sidecar-pod --containers app=nginx:1.21,sidecar=busybox"
      - "kubectl run sidecar-pod --image=nginx:1.21 && kubectl add container sidecar-pod busybox"
    answer: 1
    hint: |
      kubectl run não suporta múltiplos containers. Use YAML:
        kubectl run sidecar-pod --image=nginx:1.21 --dry-run=client -o yaml > sidecar-pod.yaml
      Edite o arquivo e adicione o segundo container, depois: kubectl apply -f sidecar-pod.yaml
    answer_command: "kubectl apply -f sidecar-pod.yaml"
    goals:
      - description: "Pod **sidecar-pod** existe no namespace **default**"
        validation:
          command: "kubectl get pod sidecar-pod -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "sidecar-pod"
      - description: "Container **app** usa a imagem **nginx:1.21**"
        validation:
          command: "kubectl get pod sidecar-pod -o jsonpath='{.spec.containers[?(@.name==\"app\")].image}' 2>/dev/null"
          expected_contains: "nginx:1.21"
      - description: "Container **sidecar** (busybox) está presente"
        validation:
          command: "kubectl get pod sidecar-pod -o jsonpath='{.spec.containers[?(@.name==\"sidecar\")].image}' 2>/dev/null"
          expected_contains: "busybox"
      - description: "Pod tem exatamente **2 containers**"
        validation:
          command: "kubectl get pod sidecar-pod -o jsonpath='{.spec.containers}' 2>/dev/null | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))' 2>/dev/null || kubectl get pod sidecar-pod -o jsonpath='{.spec.containers[*].name}' 2>/dev/null | wc -w"
          expected_contains: "2"
    teardown:
      - "kubectl delete pod sidecar-pod --ignore-not-found=true"
    explanation: "Pods multi-container não podem ser criados via kubectl run — requerem YAML com spec.containers[] como lista. Containers em um mesmo Pod compartilham network namespace (localhost) e podem compartilhar volumes."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/pods/#how-pods-manage-multiple-containers"
    doc_section: "Concepts → Pods → Multi-container Pods"

  - id: ckad-lab-002
    cert: CKAD
    topic: Application Design
    difficulty: easy
    type: lab
    question: "Crie um Pod **init-pod** com um **initContainer** chamado **init-db** (imagem: busybox) que execute **echo 'ready' > /init/status** antes do container principal **app** (nginx:1.21) que monta o mesmo volume em **/data**."
    options:
      - "spec.startupContainers[]"
      - "spec.beforeContainers[]"
      - "spec.initContainers[]"
      - "spec.preRunContainers[]"
    answer: 2
    hint: |
      Crie YAML com spec.initContainers[] e spec.volumes[] (emptyDir) compartilhado entre init e app:
        kubectl run init-pod --image=nginx:1.21 --dry-run=client -o yaml > init-pod.yaml
      Adicione initContainers e o volume, depois: kubectl apply -f init-pod.yaml
    answer_command: "kubectl apply -f pod-with-init.yaml"
    goals:
      - description: "Pod **init-pod** existe no cluster"
        validation:
          command: "kubectl get pod init-pod -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "init-pod"
      - description: "initContainer **init-db** está presente"
        validation:
          command: "kubectl get pod init-pod -o jsonpath='{.spec.initContainers[0].name}' 2>/dev/null"
          expected_contains: "init-db"
      - description: "Container principal **app** usa **nginx:1.21**"
        validation:
          command: "kubectl get pod init-pod -o jsonpath='{.spec.containers[?(@.name==\"app\")].image}' 2>/dev/null"
          expected_contains: "nginx:1.21"
    teardown:
      - "kubectl delete pod init-pod --ignore-not-found=true"
    explanation: "initContainers são executados sequencialmente antes dos containers principais. Se um initContainer falhar, o Pod não inicia. Útil para pré-configuração: migrations de banco, espera por serviços, geração de configuração."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/pods/init-containers/"
    doc_section: "Concepts → Pods → Init Containers"

  - id: ckad-lab-003
    cert: CKAD
    topic: Configuration
    difficulty: easy
    type: lab
    question: "Crie um Pod **env-pod** com a imagem **nginx** que tenha a variável de ambiente **APP_ENV=production** definida inline na spec."
    options:
      - "kubectl run env-pod --image=nginx --env APP_ENV=production"
      - "kubectl run env-pod --image=nginx --set-env=APP_ENV=production"
      - "kubectl run env-pod --image=nginx -e APP_ENV=production"
      - "kubectl create pod env-pod --image=nginx --env=APP_ENV=production"
    answer: 0
    answer_command: "kubectl run env-pod --image=nginx --env APP_ENV=production"
    validation:
      command: "kubectl exec env-pod -- env | grep APP_ENV"
      expected_contains: "production"
    teardown:
      - "kubectl delete pod env-pod --ignore-not-found=true"
    explanation: "--env (ou -e) define variáveis de ambiente diretamente. Em YAML, use spec.containers[].env com name/value. Para referenciar ConfigMap: envFrom.configMapRef ou env[].valueFrom.configMapKeyRef."
    doc_url: "https://kubernetes.io/docs/tasks/inject-data-application/define-environment-variable-container/"
    doc_section: "Tasks → Inject Data → Environment Variables"

  - id: ckad-lab-004
    cert: CKAD
    topic: Configuration
    difficulty: easy
    type: lab
    question: "Crie um ConfigMap **app-settings** com os dados do arquivo **config.properties** usando kubectl."
    options:
      - "kubectl create configmap app-settings --from-literal=config.properties"
      - "kubectl create configmap app-settings --from-file=config.properties"
      - "kubectl apply configmap app-settings --file=config.properties"
      - "kubectl create configmap app-settings --import=config.properties"
    answer: 1
    answer_command: "kubectl create configmap app-settings --from-file=config.properties"
    explanation: "--from-file cria uma entrada no ConfigMap com o nome do arquivo como chave e o conteúdo como valor. Para múltiplos arquivos de um diretório: --from-file=./config-dir/. Para literais: --from-literal=chave=valor."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/"
    doc_section: "Tasks → Configure Pod → ConfigMap"

  - id: ckad-lab-005
    cert: CKAD
    topic: Configuration
    difficulty: easy
    type: lab
    question: "Crie um Secret genérico **api-keys** com **API_KEY=abc123** e **API_SECRET=xyz789**."
    options:
      - "kubectl create secret generic api-keys --from-literal=API_KEY=abc123 --from-literal=API_SECRET=xyz789"
      - "kubectl create secret api-keys --data=API_KEY=abc123,API_SECRET=xyz789"
      - "kubectl apply secret generic api-keys API_KEY=abc123 API_SECRET=xyz789"
      - "kubectl create secret generic api-keys --key=API_KEY=abc123 --key=API_SECRET=xyz789"
    answer: 0
    answer_command: "kubectl create secret generic api-keys --from-literal=API_KEY=abc123 --from-literal=API_SECRET=xyz789"
    goals:
      - description: "Secret **api-keys** existe no namespace **default**"
        validation:
          command: "kubectl get secret api-keys -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "api-keys"
      - description: "Secret contém a chave **API_KEY**"
        validation:
          command: "kubectl get secret api-keys -o jsonpath='{.data.API_KEY}' 2>/dev/null | base64 -d 2>/dev/null"
          expected_contains: "abc123"
      - description: "Secret contém a chave **API_SECRET**"
        validation:
          command: "kubectl get secret api-keys -o jsonpath='{.data.API_SECRET}' 2>/dev/null | base64 -d 2>/dev/null"
          expected_contains: "xyz789"
    teardown:
      - "kubectl delete secret api-keys --ignore-not-found=true"
    explanation: "Secrets genéricos armazenam pares chave-valor codificados em base64. Para usar em pods: envFrom.secretRef (todas as chaves) ou env[].valueFrom.secretKeyRef (chave específica) ou como volume."
    doc_url: "https://kubernetes.io/docs/concepts/configuration/secret/"
    doc_section: "Concepts → Configuration → Secrets"

  - id: ckad-lab-006
    cert: CKAD
    topic: Application Deployment
    difficulty: easy
    type: lab
    question: "Crie um Deployment **web-app** com imagem **nginx:1.21** e **2 réplicas**. Gere o YAML sem criar no cluster."
    options:
      - "kubectl create deployment web-app --image=nginx:1.21 --replicas=2 --preview"
      - "kubectl create deployment web-app --image=nginx:1.21 --replicas=2 --dry-run=client -o yaml"
      - "kubectl generate deployment web-app --image=nginx:1.21 --replicas=2"
      - "kubectl template deployment web-app --image=nginx:1.21 --replicas=2"
    answer: 1
    answer_command: "kubectl create deployment web-app --image=nginx:1.21 --replicas=2 --dry-run=client -o yaml"
    explanation: "--dry-run=client gera o manifesto sem criar recursos. Essencial no exame CKAD para criar templates rapidamente e então modificar conforme necessário antes de aplicar."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/conventions/"
    doc_section: "Reference → kubectl → Conventions"

  - id: ckad-lab-007
    cert: CKAD
    topic: Application Deployment
    difficulty: easy
    type: lab
    question: "Verifique o status do rollout do Deployment **backend** e aguarde sua conclusão."
    options:
      - "kubectl get rollout deployment/backend --wait"
      - "kubectl rollout status deployment/backend"
      - "kubectl watch deployment backend"
      - "kubectl describe deployment backend --rollout"
    answer: 1
    answer_command: "kubectl rollout status deployment/backend"
    explanation: "kubectl rollout status bloqueia até o Deployment estar Available ou falhar. Retorna exit code 0 em sucesso. No exame, use após kubectl set image ou kubectl apply para confirmar que o rollout completou."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/generated/kubectl_rollout/kubectl_rollout_status/"
    doc_section: "Reference → kubectl rollout status"

  - id: ckad-lab-008
    cert: CKAD
    topic: Application Deployment
    difficulty: easy
    type: lab
    question: "Escale o Deployment **frontend** de 2 para **4 réplicas**."
    options:
      - "kubectl update deployment frontend --replicas=4"
      - "kubectl resize deployment frontend 4"
      - "kubectl scale deployment frontend --replicas=4"
      - "kubectl set replicas deployment/frontend 4"
    answer: 2
    answer_command: "kubectl scale deployment frontend --replicas=4"
    setup:
      - description: "Criando deployment frontend com 2 réplicas..."
        command: "kubectl create deployment frontend --image=nginx:1.21 --replicas=2 2>/dev/null || true"
      - description: "Aguardando réplicas ficarem prontas..."
        command: "kubectl rollout status deployment/frontend --timeout=60s 2>/dev/null || true"
    goals:
      - description: "Deployment **frontend** tem **4 réplicas** configuradas"
        hint: "kubectl scale deployment frontend --replicas=4"
        validation:
          command: "kubectl get deployment frontend -o jsonpath='{.spec.replicas}' 2>/dev/null"
          expected_contains: "4"
      - description: "Todas as 4 réplicas estão **Ready**"
        validation:
          command: "kubectl get deployment frontend -o jsonpath='{.status.readyReplicas}' 2>/dev/null"
          expected_contains: "4"
    teardown:
      - "kubectl delete deployment frontend --ignore-not-found=true"
    explanation: "kubectl scale ajusta o número de réplicas imediatamente. Também funciona com ReplicaSets e StatefulSets. Para escala condicional: --current-replicas=2 escala apenas se o número atual corresponder."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#scaling-a-deployment"
    doc_section: "Concepts → Deployments → Scaling"

  - id: ckad-lab-009
    cert: CKAD
    topic: Observability
    difficulty: easy
    type: lab
    question: "Veja os logs das últimas **50 linhas** do pod **app-pod** e mantenha streaming."
    options:
      - "kubectl logs app-pod --last=50 --stream"
      - "kubectl logs app-pod --tail=50 -f"
      - "kubectl log app-pod -n 50 --follow"
      - "kubectl get logs app-pod --tail 50 --watch"
    answer: 1
    answer_command: "kubectl logs app-pod --tail=50 -f"
    explanation: "--tail=N mostra as últimas N linhas. -f (--follow) ativa streaming em tempo real. Útil para monitorar aplicações. --since=1h mostra logs da última hora. -c para container específico em pods multi-container."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/generated/kubectl_logs/"
    doc_section: "Reference → kubectl logs"

  - id: ckad-lab-010
    cert: CKAD
    topic: Services
    difficulty: easy
    type: lab
    question: "Exponha o Pod **api-pod** (porta 8080) como Service ClusterIP chamado **api-pod** na porta **80**."
    options:
      - "kubectl expose pod api-pod --port=80 --target-port=8080"
      - "kubectl create service clusterip api-pod --port=80 --target-port=8080"
      - "kubectl expose pod api-pod --port=80 --container-port=8080"
      - "kubectl service api-pod --port=80 --pod-port=8080"
    answer: 0
    answer_command: "kubectl expose pod api-pod --port=80 --target-port=8080"
    setup:
      - description: "Criando pod api-pod..."
        command: "kubectl run api-pod --image=nginx --port=8080 2>/dev/null || true"
    goals:
      - description: "Service **api-pod** existe"
        hint: "kubectl expose pod api-pod --port=80 --target-port=8080"
        validation:
          command: "kubectl get service api-pod -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "api-pod"
      - description: "Service é do tipo **ClusterIP**"
        validation:
          command: "kubectl get service api-pod -o jsonpath='{.spec.type}' 2>/dev/null"
          expected_contains: "ClusterIP"
      - description: "Service escuta na porta **80**"
        validation:
          command: "kubectl get service api-pod -o jsonpath='{.spec.ports[0].port}' 2>/dev/null"
          expected_contains: "80"
    teardown:
      - "kubectl delete service api-pod --ignore-not-found=true"
      - "kubectl delete pod api-pod --ignore-not-found=true"
    explanation: "--port é a porta do Service (acessada pelos clientes), --target-port é a porta do container (onde a aplicação escuta). Se omitir --target-port, usa o mesmo valor de --port."
    doc_url: "https://kubernetes.io/docs/concepts/services-networking/service/"
    doc_section: "Concepts → Services"

  - id: ckad-lab-011
    cert: CKAD
    topic: Services
    difficulty: easy
    type: lab
    question: "Crie um CronJob **hello-cron** que execute **echo hello** a cada minuto usando a imagem **busybox**."
    options:
      - "kubectl create cronjob hello-cron --schedule='* * * * *' --image=busybox -- echo hello"
      - "kubectl run cronjob hello-cron --schedule=@minutely --image=busybox -- echo hello"
      - "kubectl create job hello-cron --schedule='*/1 * * * *' --image=busybox -- echo hello"
      - "kubectl create cronjob hello-cron --interval=1m --image=busybox -- echo hello"
    answer: 0
    answer_command: "kubectl create cronjob hello-cron --schedule='* * * * *' --image=busybox -- echo hello"
    goals:
      - description: "CronJob **hello-cron** existe"
        hint: "kubectl create cronjob hello-cron --schedule='* * * * *' --image=busybox -- echo hello"
        validation:
          command: "kubectl get cronjob hello-cron -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "hello-cron"
      - description: "Schedule está configurado para **'* * * * *'** (todo minuto)"
        validation:
          command: "kubectl get cronjob hello-cron -o jsonpath='{.spec.schedule}' 2>/dev/null"
          expected_contains: "* * * * *"
      - description: "Imagem do CronJob é **busybox**"
        validation:
          command: "kubectl get cronjob hello-cron -o jsonpath='{.spec.jobTemplate.spec.template.spec.containers[0].image}' 2>/dev/null"
          expected_contains: "busybox"
    teardown:
      - "kubectl delete cronjob hello-cron --ignore-not-found=true"
    explanation: "CronJobs usam sintaxe cron padrão (minuto hora dia mês dia-semana). '* * * * *' = todo minuto. '0 * * * *' = todo início de hora. @hourly é atalho equivalente. O CronJob cria Jobs filhos conforme a agenda."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/"
    doc_section: "Concepts → Workloads → CronJobs"

  - id: ckad-lab-012
    cert: CKAD
    topic: Application Design
    difficulty: easy
    type: lab
    question: "Um pod usa um volume **emptyDir** compartilhado entre containers. Qual é a característica principal de **emptyDir**?"
    options:
      - "Persiste dados após o pod ser deletado — útil para persistência de longo prazo"
      - "Compartilha dados entre containers do mesmo pod; é destruído quando o pod termina"
      - "Monta um diretório do nó host dentro do container"
      - "Cria automaticamente um PersistentVolumeClaim para o pod"
    answer: 1
    answer_command: "kubectl apply -f pod-emptydir.yaml"
    explanation: "emptyDir é criado quando o Pod é atribuído a um nó e persiste enquanto o Pod existir. Todos os containers no Pod podem ler e escrever. É destruído permanentemente quando o Pod é removido. Ideal para cache ou compartilhamento entre sidecar containers."
    doc_url: "https://kubernetes.io/docs/concepts/storage/volumes/#emptydir"
    doc_section: "Concepts → Storage → Volumes → emptyDir"

  - id: ckad-lab-013
    cert: CKAD
    topic: Application Design
    difficulty: easy
    type: lab
    question: "Liste todos os pods que foram reiniciados mais de 3 vezes (CrashLoopBackOff) em todos os namespaces."
    options:
      - "kubectl get pods -A --restart>3"
      - "kubectl get pods -A | awk '$4 > 3 {print}'"
      - "kubectl get pods -A --field-selector=status.containerStatuses.restartCount>3"
      - "kubectl get pods -A -o wide | grep CrashLoop"
    answer: 1
    answer_command: "kubectl get pods -A | awk 'NR==1 || $5 > 3'"
    explanation: "kubectl não tem filtro nativo para contagem de restarts. Usa-se pipelines shell (awk, grep) para filtrar a saída. -o wide mostra mais informações. Para inspecionar: kubectl describe pod <name> e kubectl logs <name> --previous."
    doc_url: "https://kubernetes.io/docs/tasks/debug/debug-application/debug-pods/"
    doc_section: "Tasks → Debug → Debug Pods"

  - id: ckad-lab-014
    cert: CKAD
    topic: Application Design
    difficulty: easy
    type: lab
    question: "Forçe o pod **stale-pod** a ser recriado sem deletar e recriar manualmente o Deployment."
    options:
      - "kubectl restart pod stale-pod"
      - "kubectl delete pod stale-pod (o ReplicaSet recria automaticamente)"
      - "kubectl replace pod stale-pod"
      - "kubectl refresh pod stale-pod"
    answer: 1
    answer_command: "kubectl delete pod stale-pod"
    explanation: "Pods gerenciados por um ReplicaSet (via Deployment) são automaticamente recriados quando deletados. Para pods não gerenciados: kubectl delete e reaplicar o YAML. 'kubectl rollout restart deployment/X' é mais seguro para Deployments pois faz rolling restart."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/"
    doc_section: "Concepts → Workloads → ReplicaSet"

  - id: ckad-lab-015
    cert: CKAD
    topic: Configuration
    difficulty: easy
    type: lab
    question: "Edite o ConfigMap **app-config** para adicionar a chave **TIMEOUT=30** sem recriar o recurso."
    options:
      - "kubectl update configmap app-config --from-literal=TIMEOUT=30"
      - "kubectl edit configmap app-config"
      - "kubectl patch configmap app-config --data TIMEOUT=30"
      - "kubectl set data configmap/app-config TIMEOUT=30"
    answer: 1
    answer_command: "kubectl edit configmap app-config"
    explanation: "kubectl edit abre o recurso no editor padrão ($EDITOR ou vi). Após salvar, o Kubernetes aplica a mudança. Alternativa: kubectl patch -p '{\"data\":{\"TIMEOUT\":\"30\"}}'. Atenção: pods precisam ser reiniciados para ver vars de env atualizadas."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/#edit-a-configmap"
    doc_section: "Tasks → Configure Pod → ConfigMap → Edit"

  # ── MID: Observability & Probes ───────────────────────────
  - id: ckad-lab-016
    cert: CKAD
    topic: Observability
    difficulty: mid
    type: lab
    question: "Adicione um **livenessProbe** HTTP ao container **api** do Deployment **api-deploy**: verificar **GET /healthz** na porta **8080** a cada **10 segundos**, com **3 falhas** antes de reiniciar."
    options:
      - "kubectl set liveness deployment/api-deploy --http-get=/healthz --port=8080 --period=10 --failure=3"
      - "Adicionar via YAML: livenessProbe.httpGet.path=/healthz, port=8080, periodSeconds=10, failureThreshold=3"
      - "kubectl patch deployment api-deploy --probe=liveness:http:8080:/healthz:10s:3"
      - "kubectl annotate deployment api-deploy liveness=http:8080:/healthz"
    answer: 1
    answer_command: "kubectl apply -f deployment-with-probe.yaml"
    explanation: "Probes não podem ser adicionados via kubectl set — requerem edição do YAML. livenessProbe reinicia o container se falhar. readinessProbe remove o pod do endpoint se falhar. startupProbe dá tempo para aplicações lentas iniciarem antes do liveness começar."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/"
    doc_section: "Tasks → Configure Pod → Probes"

  - id: ckad-lab-017
    cert: CKAD
    topic: Observability
    difficulty: mid
    type: lab
    question: "Configure um **readinessProbe** TCP no container **db** (porta **5432**) com **initialDelaySeconds=5** e **periodSeconds=10**."
    options:
      - "readinessProbe.httpGet.port=5432 é a forma correta para TCP"
      - "readinessProbe.tcpSocket.port=5432, initialDelaySeconds=5, periodSeconds=10 no YAML"
      - "kubectl set readiness deployment/db --tcp=5432 --delay=5 --period=10"
      - "readinessProbe.exec com command: ['nc', '-z', 'localhost', '5432']"
    answer: 1
    answer_command: "kubectl apply -f db-deployment.yaml"
    explanation: "readinessProbe.tcpSocket verifica se a porta está aceitando conexões. initialDelaySeconds aguarda antes da primeira verificação (tempo para o app iniciar). periodSeconds define a frequência. failureThreshold=3 é o padrão antes de marcar como NotReady."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-a-tcp-liveness-probe"
    doc_section: "Tasks → Configure Pod → Probes → TCP"

  - id: ckad-lab-018
    cert: CKAD
    topic: Observability
    difficulty: mid
    type: lab
    question: "Como depurar um pod com CrashLoopBackOff: qual é a sequência correta de diagnóstico?"
    options:
      - "kubectl restart pod <name> → kubectl describe pod <name> → verificar eventos"
      - "kubectl describe pod <name> → kubectl logs <name> --previous → kubectl exec <name> -- sh para investigar"
