  - id: ckad-lab-038
    cert: CKAD
    topic: Observability
    difficulty: mid
    type: lab
    question: "Crie um Pod **probe-pod** (nginx:1.21) com **livenessProbe** HTTP em **/healthz** porta **80**, **initialDelaySeconds=5**, **periodSeconds=10**, e **readinessProbe** TCP na porta **80** com **initialDelaySeconds=3**."
    options:
      - "kubectl run probe-pod --image=nginx:1.21 --liveness=http:/healthz:80 --readiness=tcp:80"
      - "Criar via YAML com livenessProbe.httpGet e readinessProbe.tcpSocket configurados"
      - "kubectl annotate pod probe-pod liveness=http:80:/healthz readiness=tcp:80"
      - "kubectl patch pod probe-pod --probe=liveness:http:80:/healthz,readiness:tcp:80"
    answer: 1
    hint: |
      Gere o YAML base e edite:
        kubectl run probe-pod --image=nginx:1.21 --dry-run=client -o yaml > probe-pod.yaml
      Adicione livenessProbe e readinessProbe ao container, depois:
        kubectl apply -f probe-pod.yaml
    answer_command: "kubectl apply -f probe-pod.yaml"
    goals:
      - description: "Pod **probe-pod** existe"
        validation:
          command: "kubectl get pod probe-pod -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "probe-pod"
      - description: "Pod tem **livenessProbe** configurada"
        validation:
          command: "kubectl get pod probe-pod -o jsonpath='{.spec.containers[0].livenessProbe.httpGet.path}' 2>/dev/null"
          expected_contains: "healthz"
      - description: "Pod tem **readinessProbe** configurada"
        validation:
          command: "kubectl get pod probe-pod -o jsonpath='{.spec.containers[0].readinessProbe}' 2>/dev/null | grep -cE 'tcp|80'"
          expected_contains: "1"
    teardown:
      - "kubectl delete pod probe-pod --ignore-not-found=true"
    explanation: "livenessProbe reinicia o container se falhar. readinessProbe remove o pod dos endpoints do Service se falhar (sem reiniciar). startupProbe protege apps lentas. httpGet verifica resposta HTTP, tcpSocket verifica conectividade TCP, exec executa um comando."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/"
    doc_section: "Tasks → Configure Pod → Probes"

  - id: ckad-lab-039
    cert: CKAD
    topic: Configuration
    difficulty: mid
    type: lab
    question: "Crie um Pod **resource-pod** (nginx:1.21) com **resource requests** de 100m CPU e 128Mi memória e **limits** de 200m CPU e 256Mi memória."
    options:
      - "kubectl run resource-pod --image=nginx:1.21 --requests='cpu=100m,memory=128Mi' --limits='cpu=200m,memory=256Mi'"
      - "kubectl run resource-pod --image=nginx:1.21 --cpu=100m --memory=128Mi --max-cpu=200m --max-memory=256Mi"
      - "kubectl create pod resource-pod --image=nginx:1.21 --resources=cpu:100m,memory:128Mi"
      - "kubectl run resource-pod --image=nginx:1.21 --resource-requests=cpu=100m"
    answer: 0
    answer_command: "kubectl run resource-pod --image=nginx:1.21 --requests='cpu=100m,memory=128Mi' --limits='cpu=200m,memory=256Mi'"
    goals:
      - description: "Pod **resource-pod** existe"
        hint: "kubectl run resource-pod --image=nginx:1.21 --requests='cpu=100m,memory=128Mi' --limits='cpu=200m,memory=256Mi'"
        validation:
          command: "kubectl get pod resource-pod -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "resource-pod"
      - description: "CPU request está em **100m**"
        validation:
          command: "kubectl get pod resource-pod -o jsonpath='{.spec.containers[0].resources.requests.cpu}' 2>/dev/null"
          expected_contains: "100m"
      - description: "Memory limit está em **256Mi**"
        validation:
          command: "kubectl get pod resource-pod -o jsonpath='{.spec.containers[0].resources.limits.memory}' 2>/dev/null"
          expected_contains: "256Mi"
    teardown:
      - "kubectl delete pod resource-pod --ignore-not-found=true"
    explanation: "Requests = garantia mínima que influencia o scheduling. Limits = máximo permitido (CPU é throttled, memória causa OOM kill). QoS classes: Guaranteed (requests=limits), Burstable (requests<limits), BestEffort (sem requests/limits)."
    doc_url: "https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/"
    doc_section: "Concepts → Configuration → Resource Management"

  - id: ckad-lab-040
    cert: CKAD
    topic: Application Design
    difficulty: mid
    type: lab
    question: "Crie um **StatefulSet** chamado **mysql** com imagem **mysql:8.0**, **1 réplica**, variável de ambiente **MYSQL_ROOT_PASSWORD=secret** e um **volumeClaimTemplate** de **1Gi** com StorageClass **standard**."
    options:
      - "kubectl create statefulset mysql --image=mysql:8.0 --replicas=1 --volume-claim=1Gi"
      - "Criar via YAML com kind: StatefulSet, volumeClaimTemplates, e env MYSQL_ROOT_PASSWORD"
      - "kubectl run mysql --image=mysql:8.0 --stateful --pvc=1Gi"
      - "kubectl create deployment mysql --image=mysql:8.0 --pvc=standard:1Gi"
    answer: 1
    hint: |
      StatefulSets requerem YAML. Use como base:
        kubectl create statefulset mysql --image=mysql:8.0 --dry-run=client -o yaml > mysql-sts.yaml
      Adicione volumeClaimTemplates e env, depois: kubectl apply -f mysql-sts.yaml
    answer_command: "kubectl apply -f mysql-sts.yaml"
    goals:
      - description: "StatefulSet **mysql** existe"
        validation:
          command: "kubectl get statefulset mysql -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "mysql"
      - description: "StatefulSet usa a imagem **mysql:8.0**"
        validation:
          command: "kubectl get statefulset mysql -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null"
          expected_contains: "mysql:8.0"
      - description: "StatefulSet tem **volumeClaimTemplates** de **1Gi**"
        validation:
          command: "kubectl get statefulset mysql -o jsonpath='{.spec.volumeClaimTemplates[0].spec.resources.requests.storage}' 2>/dev/null"
          expected_contains: "1Gi"
    teardown:
      - "kubectl delete statefulset mysql --ignore-not-found=true"
      - "kubectl delete pvc -l app=mysql --ignore-not-found=true 2>/dev/null || true"
    explanation: "StatefulSets garantem identidade de rede estável (pod-0, pod-1...) e ordem de criação/deleção. volumeClaimTemplates cria um PVC por réplica automaticamente. Os PVCs sobrevivem à deleção do StatefulSet — dados preservados."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/"
    doc_section: "Concepts → Workloads → StatefulSets"

  - id: ckad-lab-041
    cert: CKAD
    topic: Services
    difficulty: mid
    type: lab
    question: "Crie uma **NetworkPolicy** chamada **allow-frontend** no namespace **default** que permita tráfego de entrada (ingress) na porta **80** apenas de pods com label **app=frontend**."
    options:
      - "kubectl create networkpolicy allow-frontend --ingress-from=app=frontend --port=80"
      - "Criar via YAML com podSelector, policyTypes: [Ingress], ingress.from.podSelector: {app: frontend}, ingress.ports: [{port: 80}]"
      - "kubectl annotate namespace default allow-from=app=frontend"
      - "kubectl create networkpolicy allow-frontend --from=frontend --port=80"
    answer: 1
    hint: |
      NetworkPolicies requerem YAML. Exemplo:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata: {name: allow-frontend}
        spec:
          podSelector: {}
          policyTypes: [Ingress]
          ingress:
          - from:
            - podSelector:
                matchLabels:
                  app: frontend
            ports:
            - port: 80
    answer_command: "kubectl apply -f allow-frontend-policy.yaml"
    goals:
      - description: "NetworkPolicy **allow-frontend** existe"
        hint: "Crie via YAML com podSelector e ingress.from.podSelector.matchLabels.app=frontend"
        validation:
          command: "kubectl get networkpolicy allow-frontend -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "allow-frontend"
      - description: "Policy tem tipo **Ingress**"
        validation:
          command: "kubectl get networkpolicy allow-frontend -o jsonpath='{.spec.policyTypes[0]}' 2>/dev/null"
          expected_contains: "Ingress"
      - description: "Regra permite pods com label **app=frontend**"
        validation:
          command: "kubectl get networkpolicy allow-frontend -o jsonpath='{.spec.ingress[0].from[0].podSelector.matchLabels}' 2>/dev/null"
          expected_contains: "frontend"
    teardown:
      - "kubectl delete networkpolicy allow-frontend --ignore-not-found=true"
    explanation: "NetworkPolicies isolam tráfego de rede entre pods. podSelector sem regras = todos os pods do namespace. from.podSelector seleciona pods origem. from.namespaceSelector seleciona namespaces. Requer CNI com suporte (Calico, Cilium, Weave)."
    doc_url: "https://kubernetes.io/docs/concepts/services-networking/network-policies/"
    doc_section: "Concepts → Network Policies"

  - id: ckad-lab-042
    cert: CKAD
    topic: Application Design
    difficulty: hard
    type: lab
    question: "Crie um **DaemonSet** chamado **log-collector** com imagem **busybox** que execute **sleep 3600** e monte o diretório do host **/var/log** como volume **readonly** em **/host-logs**."
    options:
      - "kubectl create daemonset log-collector --image=busybox -- sleep 3600 --volume=/var/log:/host-logs:ro"
      - "Criar via YAML: kind: DaemonSet com volumes.hostPath.path=/var/log e volumeMounts.readOnly=true"
      - "kubectl run daemonset/log-collector --image=busybox --host-volume=/var/log"
      - "kubectl create ds log-collector --image=busybox --mount-host=/var/log:/host-logs"
    answer: 1
    hint: |
      DaemonSets requerem YAML:
        apiVersion: apps/v1
        kind: DaemonSet
        metadata: {name: log-collector}
        spec:
          selector: {matchLabels: {name: log-collector}}
          template:
            metadata: {labels: {name: log-collector}}
            spec:
              volumes:
              - name: host-logs
                hostPath: {path: /var/log}
              containers:
              - name: collector
                image: busybox
                command: [sleep, "3600"]
                volumeMounts:
                - name: host-logs
                  mountPath: /host-logs
                  readOnly: true
    answer_command: "kubectl apply -f log-collector-ds.yaml"
    goals:
      - description: "DaemonSet **log-collector** existe"
        hint: "Crie via YAML com kind: DaemonSet"
        validation:
          command: "kubectl get daemonset log-collector -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "log-collector"
      - description: "DaemonSet usa imagem **busybox**"
        validation:
          command: "kubectl get daemonset log-collector -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null"
          expected_contains: "busybox"
      - description: "Volume **hostPath** montado em **/host-logs**"
        validation:
          command: "kubectl get daemonset log-collector -o jsonpath='{.spec.template.spec.containers[0].volumeMounts[0].mountPath}' 2>/dev/null"
          expected_contains: "host-logs"
    teardown:
      - "kubectl delete daemonset log-collector --ignore-not-found=true"
    explanation: "DaemonSets garantem exatamente um pod por nó elegível. hostPath monta diretórios do nó. readOnly=true impede o container de modificar logs do host. Para incluir control-plane, adicione toleration para node-role.kubernetes.io/control-plane:NoSchedule."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/daemonset/"
    doc_section: "Concepts → Workloads → DaemonSets"

  - id: ckad-lab-043
    cert: CKAD
    topic: Application Deployment
    difficulty: hard
    type: lab
    question: "O Deployment **api-deploy** teve rollout com falha. Visualize o histórico de rollout, depois reverta para a revisão anterior."
    options:
      - "kubectl rollout history deployment/api-deploy && kubectl rollout revert deployment/api-deploy"
      - "kubectl rollout history deployment/api-deploy && kubectl rollout undo deployment/api-deploy"
      - "kubectl get history deployment api-deploy && kubectl restore deployment api-deploy"
      - "kubectl describe deployment api-deploy --history && kubectl rollback api-deploy"
    answer: 1
    hint: |
      1. kubectl rollout history deployment/api-deploy
      2. kubectl rollout undo deployment/api-deploy
      (Para revisão específica: kubectl rollout undo deployment/api-deploy --to-revision=1)
    answer_command: "kubectl rollout history deployment/api-deploy && kubectl rollout undo deployment/api-deploy"
    setup:
      - description: "Criando deployment api-deploy com nginx:1.21..."
        command: "kubectl create deployment api-deploy --image=nginx:1.21 2>/dev/null || true"
      - description: "Aguardando primeira versão..."
        command: "kubectl rollout status deployment/api-deploy --timeout=60s 2>/dev/null || true"
      - description: "Atualizando imagem para nginx:1.25 (gerando histórico)..."
        command: "kubectl set image deployment/api-deploy nginx=nginx:1.25 2>/dev/null || true"
      - description: "Aguardando rollout completar..."
        command: "kubectl rollout status deployment/api-deploy --timeout=60s 2>/dev/null || true"
    goals:
      - description: "Deployment **api-deploy** foi revertido (revisão anterior restaurada)"
        hint: "kubectl rollout undo deployment/api-deploy"
        validation:
          command: "kubectl get deployment api-deploy -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null"
          expected_contains: "nginx:1.21"
    teardown:
      - "kubectl delete deployment api-deploy --ignore-not-found=true"
    explanation: "kubectl rollout undo reverte para a revisão anterior (N-1). --to-revision=N para versão específica. Histórico é limitado por spec.revisionHistoryLimit (padrão: 10). Adicione --record às mudanças para incluir o comando no histórico (deprecated mas ainda útil)."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-back-a-deployment"
    doc_section: "Concepts → Deployments → Rolling Back"
