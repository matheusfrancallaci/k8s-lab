    options:
      - "kubectl create deployment web --image=nginx:1.21 --replicas=3 && kubectl set image deployment/web nginx=nginx:1.25"
      - "kubectl run web --image=nginx:1.21 --replicas=3 && kubectl update image web nginx:1.25"
      - "kubectl create deployment web --image=nginx:1.25 --replicas=3"
      - "kubectl apply deployment web --image=nginx:1.21 && kubectl upgrade web nginx:1.25"
    answer: 0
    hint: |
      1. kubectl create deployment web --image=nginx:1.21 --replicas=3
      2. kubectl set image deployment/web nginx=nginx:1.25
      3. kubectl rollout status deployment/web
    answer_command: "kubectl create deployment web --image=nginx:1.21 --replicas=3 && kubectl set image deployment/web nginx=nginx:1.25"
    goals:
      - description: "Deployment **web** existe com **3 réplicas**"
        hint: "kubectl create deployment web --image=nginx:1.21 --replicas=3"
        validation:
