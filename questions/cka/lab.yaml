  # ── MID: Troubleshooting ──────────────────────────────────
  - id: cka-lab-042
    cert: CKA
    topic: Troubleshooting
    difficulty: mid
    type: lab
    question: "O pod **nginx-pod** já está rodando. Visualize seus logs em tempo real (streaming)."
    options:
      - "kubectl logs nginx-pod --live"
      - "kubectl logs nginx-pod -f"
      - "kubectl watch logs nginx-pod"
      - "kubectl stream nginx-pod"
    answer: 1
    hint: "kubectl logs <pod-name>"
    answer_command: "kubectl logs nginx-pod -f"
    setup:
      - description: "Criando pod nginx-pod..."
        command: "kubectl run nginx-pod --image=nginx:1.21"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/nginx-pod --timeout=90s"
    validation:
