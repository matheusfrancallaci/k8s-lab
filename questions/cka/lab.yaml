    options:
      - "kubectl create networkpolicy allow-frontend --pod-selector=tier=backend --ingress-from=tier=frontend --port=3306"
      - "Criar via YAML: spec.podSelector={tier:backend}, spec.ingress=[{from:[{podSelector:{tier:frontend}}], ports:[{port:3306}]}]"
      - "kubectl expose pod backend --from=frontend --port=3306"
