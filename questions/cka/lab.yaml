  - id: cka-lab-045
    cert: CKA
    topic: Cluster Maintenance
    difficulty: mid
    type: lab
    question: "O nó **node01** precisa de manutenção. Evacue todos os pods dele de forma segura."
    options:
      - "kubectl delete pods --all --node=node01"
      - "kubectl drain node01 --ignore-daemonsets --delete-emptydir-data"
      - "kubectl cordon node01 && kubectl delete pods -A --node=node01"
      - "kubectl taint node node01 maintenance=true:NoExecute"
    answer: 1
    hint: "Neste cluster (minikube) o nó se chama **minikube**. Use: kubectl drain minikube --ignore-daemonsets --delete-emptydir-data"
    answer_command: "kubectl drain $(kubectl get nodes -o jsonpath='{.items[0].metadata.name}') --ignore-daemonsets --delete-emptydir-data"
    goals:
      - description: "Nó marcado como **SchedulingDisabled** (drain executa cordon automaticamente)"
        validation:
          command: "kubectl get nodes --no-headers 2>/dev/null | grep -c 'SchedulingDisabled'"
          expected_contains: "1"
    teardown:
      - "kubectl uncordon $(kubectl get nodes -o jsonpath='{.items[0].metadata.name}') 2>/dev/null || true"
    explanation: "kubectl drain cordon o nó (impede novos pods) E evacua os pods existentes para outros nós. --ignore-daemonsets ignora DaemonSet pods (que não podem ser movidos). --delete-emptydir-data permite remover pods com volumes emptyDir."
    doc_url: "https://kubernetes.io/docs/tasks/administer-cluster/safely-drain-node/"
    doc_section: "Tasks → Administer Cluster → Drain Node"

