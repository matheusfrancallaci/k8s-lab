questions:
  # ── EASY: Core Concepts ───────────────────────────────────
  - id: cka-lab-001
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Crie um Pod chamado **nginx-pod** usando a imagem **nginx:1.21** no namespace **default**.\n\nO Pod deve estar Running e usando a imagem correta."
    options:
      - "kubectl apply pod nginx-pod --image=nginx:1.21"
      - "kubectl run nginx-pod --image=nginx:1.21"
      - "kubectl create pod nginx-pod --image=nginx:1.21"
      - "kubectl deploy nginx-pod --image=nginx:1.21"
    answer: 1
    hint: "kubectl run <nome> --image=<imagem>"
    answer_command: "kubectl run nginx-pod --image=nginx:1.21"
    goals:
      - description: "Pod **nginx-pod** existe no namespace **default**"
        hint: "kubectl run nginx-pod --image=nginx:1.21"
        validation:
          command: "kubectl get pod nginx-pod -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "nginx-pod"
      - description: "Pod está usando a imagem **nginx:1.21**"
        validation:
          command: "kubectl get pod nginx-pod -o jsonpath='{.spec.containers[0].image}' 2>/dev/null"
          expected_contains: "nginx:1.21"
      - description: "Pod está no estado **Running**"
        validation:
          command: "kubectl get pod nginx-pod -o jsonpath='{.status.phase}' 2>/dev/null"
          expected_contains: "Running"
    teardown:
      - "kubectl delete pod nginx-pod --ignore-not-found=true"
    explanation: "kubectl run cria um Pod diretamente. A flag --image define a imagem do container. Pods são a menor unidade deployável no Kubernetes."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/pods/"
    doc_section: "Concepts → Workloads → Pods"

  - id: cka-lab-002
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Liste todos os pods em **todos os namespaces** com um único comando."
    options:
      - "kubectl get pods --namespace=all"
      - "kubectl list pods --all"
      - "kubectl get pods -A"
      - "kubectl get pods --include-all-namespaces"
    answer: 2
    hint: "kubectl get pods <flag>"
    answer_command: "kubectl get pods -A"
    explanation: "-A é o atalho para --all-namespaces. Lista pods em todos os namespaces simultaneamente."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/"
    doc_section: "kubectl Cheat Sheet"

  - id: cka-lab-003
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Crie um namespace chamado **estudos** e verifique se ele foi criado corretamente."
    options:
      - "kubectl create namespace estudos"
      - "kubectl new namespace estudos"
      - "kubectl add ns estudos"
      - "kubectl init namespace estudos"
    answer: 0
    hint: "kubectl create namespace <nome>"
    answer_command: "kubectl create namespace estudos"
    goals:
      - description: "Namespace **estudos** existe no cluster"
        hint: "kubectl create namespace estudos"
        validation:
          command: "kubectl get namespace estudos -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "estudos"
      - description: "Namespace está no status **Active**"
        validation:
          command: "kubectl get namespace estudos -o jsonpath='{.status.phase}' 2>/dev/null"
          expected_contains: "Active"
    teardown:
      - "kubectl delete namespace estudos --ignore-not-found=true"
    explanation: "kubectl create namespace (ou kubectl create ns) cria um novo namespace. Namespaces isolam recursos dentro do cluster."
    doc_url: "https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/"
    doc_section: "Concepts → Namespaces"

  - id: cka-lab-004
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Liste os pods apenas no namespace **kube-system**."
    options:
      - "kubectl get pods --ns=kube-system"
      - "kubectl get pods -n kube-system"
      - "kubectl list pods kube-system"
      - "kubectl get pods --namespace-filter=kube-system"
    answer: 1
    answer_command: "kubectl get pods -n kube-system"
    explanation: "-n (ou --namespace) filtra recursos de um namespace específico. kube-system contém componentes do Kubernetes como CoreDNS e kube-proxy."
    doc_url: "https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/"
    doc_section: "Concepts → Namespaces"

  - id: cka-lab-005
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Exiba os detalhes do pod **nginx** incluindo seus eventos.\n\nO pod já foi criado para você. Use o comando correto para ver spec, status e Events."
    answer_command: "kubectl describe pod nginx"
    hint: "kubectl describe exibe spec, status, condições e Events do recurso."
    setup:
      - description: "Criando pod nginx..."
        command: "kubectl run nginx --image=nginx:1.21 --restart=Never 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/nginx --timeout=60s 2>/dev/null || true"
    teardown:
      - "kubectl delete pod nginx --ignore-not-found=true"
    goals:
      - description: "Execute `kubectl describe pod nginx` — a saída deve conter a seção **Events**"
        validation:
          command: "kubectl describe pod nginx 2>/dev/null | grep -c 'Events:'"
          expected_contains: "1"
      - description: "Pod **nginx** está no estado **Running**"
        validation:
          command: "kubectl get pod nginx -o jsonpath='{.status.phase}' 2>/dev/null"
          expected_contains: "Running"
    explanation: "kubectl describe exibe detalhes completos: spec, status, condições e Events. Events são essenciais para diagnóstico de problemas."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/"
    doc_section: "kubectl Cheat Sheet → Viewing Resources"

  - id: cka-lab-006
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Execute o comando **ls /var/log** dentro do pod **app-pod**.\n\nO pod já foi criado. Use kubectl exec para rodar o comando dentro do container."
    answer_command: "kubectl exec app-pod -- ls /var/log"
    hint: "kubectl exec <pod> -- <command>"
    setup:
      - description: "Criando pod app-pod..."
        command: "kubectl run app-pod --image=busybox:1.35 --restart=Never --command -- sleep 3600 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/app-pod --timeout=60s 2>/dev/null || true"
    teardown:
      - "kubectl delete pod app-pod --ignore-not-found=true"
    goals:
      - description: "Comando `ls /var/log` executado dentro do **app-pod**"
        validation:
          command: "kubectl exec app-pod -- ls /var/log 2>/dev/null | grep -c '.'"
          expected_contains: "1"
    explanation: "kubectl exec executa comandos em um container rodando. O '--' separa os argumentos do kubectl dos do comando."
    doc_url: "https://kubernetes.io/docs/tasks/debug/debug-application/get-shell-running-container/"
    doc_section: "Tasks → Debug → Shell Into Container"

  - id: cka-lab-007
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Visualize os logs do pod **nginx-pod**."
    options:
      - "kubectl get logs nginx-pod"
      - "kubectl describe nginx-pod --logs"
      - "kubectl log nginx-pod"
      - "kubectl logs nginx-pod"
    answer: 3
    answer_command: "kubectl logs nginx-pod"
    setup:
      - description: "Criando pod nginx-pod..."
        command: "kubectl run nginx-pod --image=nginx:1.21 --restart=Never 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/nginx-pod --timeout=90s 2>/dev/null || true"
    teardown:
      - "kubectl delete pod nginx-pod --ignore-not-found=true"
    goals:
      - description: "Execute `kubectl logs nginx-pod` — o comando deve funcionar sem erro"
        validation:
          command: "kubectl logs nginx-pod 2>/dev/null && echo 'logs_ok'"
          expected_contains: "logs_ok"
      - description: "Pod **nginx-pod** está no estado **Running**"
        validation:
          command: "kubectl get pod nginx-pod -o jsonpath='{.status.phase}' 2>/dev/null"
          expected_contains: "Running"
    explanation: "kubectl logs exibe stdout/stderr do container. Use -f para streaming em tempo real, --previous para logs do crash anterior, -c para container específico."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/#interacting-with-running-pods"
    doc_section: "kubectl Cheat Sheet → Interacting with Pods"

  - id: cka-lab-008
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Adicione a label **env=production** ao pod **api-pod**.\n\nO pod já existe. Adicione a label sem recriar o recurso."
    answer_command: "kubectl label pod api-pod env=production"
    hint: "kubectl label <resource> <name> <key>=<value>"
    setup:
      - description: "Criando pod api-pod..."
        command: "kubectl run api-pod --image=nginx:1.21 --restart=Never 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/api-pod --timeout=60s 2>/dev/null || true"
    teardown:
      - "kubectl delete pod api-pod --ignore-not-found=true"
    goals:
      - description: "Pod **api-pod** tem label `env=production`"
        validation:
          command: "kubectl get pod api-pod -o jsonpath='{.metadata.labels.env}' 2>/dev/null"
          expected_contains: "production"
    explanation: "kubectl label adiciona ou modifica labels em recursos existentes. Labels são pares chave-valor usados para organizar e selecionar recursos. Use --overwrite para modificar uma label existente."
    doc_url: "https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/"
    doc_section: "Concepts → Labels and Selectors"

  - id: cka-lab-009
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Exporte a definição YAML do pod **nginx** para o arquivo **/tmp/nginx.yaml**.\n\nO pod já existe no namespace default."
    answer_command: "kubectl get pod nginx -o yaml > /tmp/nginx.yaml"
    hint: "Use -o yaml e redirecione a saída para um arquivo."
    setup:
      - description: "Criando pod nginx..."
        command: "kubectl run nginx --image=nginx:1.21 --restart=Never 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/nginx --timeout=60s 2>/dev/null || true"
    teardown:
      - "kubectl delete pod nginx --ignore-not-found=true"
      - "rm -f /tmp/nginx.yaml"
    goals:
      - description: "Arquivo **/tmp/nginx.yaml** criado com a definição do pod"
        validation:
          command: "cat /tmp/nginx.yaml 2>/dev/null | grep -c 'kind: Pod'"
          expected_contains: "1"
    explanation: "-o yaml formata a saída como YAML. Redirecionar para um arquivo salva a definição completa do recurso para reutilização ou edição."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/"
    doc_section: "kubectl Cheat Sheet"

  - id: cka-lab-010
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Delete o pod **old-pod** sem aguardar o grace period.\n\nO pod já existe. Force a deleção imediata."
    answer_command: "kubectl delete pod old-pod --grace-period=0 --force"
    hint: "Use --grace-period=0 --force para deleção imediata."
    setup:
      - description: "Criando pod old-pod..."
        command: "kubectl run old-pod --image=nginx:1.21 --restart=Never 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/old-pod --timeout=60s 2>/dev/null || true"
    goals:
      - description: "Pod **old-pod** não existe mais no cluster"
        validation:
          command: "kubectl get pod old-pod 2>&1"
          expected_contains: "not found"
    explanation: "--grace-period=0 --force força a deleção imediata sem aguardar o shutdown gracioso. Use com cautela em produção pois pode deixar recursos pendentes."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/#pod-termination"
    doc_section: "Concepts → Pods → Lifecycle → Pod Termination"

  - id: cka-lab-011
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Liste todos os pods que têm a label **app=frontend** em todos os namespaces."
    options:
      - "kubectl get pods -A --filter app=frontend"
      - "kubectl get pods -A -l app=frontend"
      - "kubectl get pods --label app=frontend -A"
      - "kubectl filter pods app=frontend -A"
    answer: 1
    answer_command: "kubectl get pods -A -l app=frontend"
    explanation: "-l (--selector) filtra por label. Pode usar expressões: -l 'app=frontend,tier!=db' ou -l 'env in (prod,staging)'."
    doc_url: "https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/"
    doc_section: "Concepts → Labels and Selectors"

  - id: cka-lab-012
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Copie o arquivo **/etc/passwd** do pod **debug-pod** para o diretório local **/tmp/**."
    options:
      - "kubectl get file debug-pod:/etc/passwd /tmp/"
      - "kubectl cp debug-pod:/etc/passwd /tmp/passwd"
      - "kubectl download debug-pod /etc/passwd /tmp/"
      - "kubectl exec debug-pod -- cat /etc/passwd > /tmp/passwd"
    answer: 1
    answer_command: "kubectl cp debug-pod:/etc/passwd /tmp/passwd"
    setup:
      - description: "Criando pod debug-pod..."
        command: "kubectl run debug-pod --image=busybox:1.35 --restart=Never --command -- sleep 3600 2>/dev/null || true"
      - description: "Aguardando pod ficar pronto..."
        command: "kubectl wait --for=condition=ready pod/debug-pod --timeout=60s 2>/dev/null || true"
    goals:
      - description: "Arquivo **/tmp/passwd** copiado do pod com `kubectl cp debug-pod:/etc/passwd /tmp/passwd`"
        hint: "kubectl cp debug-pod:/etc/passwd /tmp/passwd"
        validation:
          command: "cat /tmp/passwd 2>/dev/null | grep -c 'root'"
          expected_contains: "1"
    teardown:
      - "kubectl delete pod debug-pod --ignore-not-found=true"
      - "rm -f /tmp/passwd"
    explanation: "kubectl cp copia arquivos de/para pods. Formato: kubectl cp <pod>:<src-path> <dest-path> (do pod para local) ou kubectl cp <src-path> <pod>:<dest-path> (do local para pod)."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/generated/kubectl_cp/"
    doc_section: "Reference → kubectl cp"

  - id: cka-lab-013
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Encaminhe a porta local **8080** para a porta **80** do pod **web-pod**."
    options:
      - "kubectl forward web-pod 8080:80"
      - "kubectl port-forward web-pod 8080:80"
      - "kubectl expose pod web-pod --port=8080 --target-port=80"
      - "kubectl tunnel web-pod --local=8080 --remote=80"
    answer: 1
    answer_command: "kubectl port-forward web-pod 8080:80"
    explanation: "kubectl port-forward cria um túnel da porta local para o pod. Útil para acessar pods sem criar um Service. Formato: <porta-local>:<porta-pod>."
    doc_url: "https://kubernetes.io/docs/tasks/access-application-cluster/port-forward-access-application-cluster/"
    doc_section: "Tasks → Access Applications → Port Forward"

  - id: cka-lab-014
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Crie um Pod chamado **busybox-sleep** com a imagem **busybox** que execute **sleep 3600**."
    options:
      - "kubectl run busybox-sleep --image=busybox --command sleep 3600"
      - "kubectl run busybox-sleep --image=busybox -- sleep 3600"
      - "kubectl create pod busybox-sleep --image=busybox --args='sleep 3600'"
      - "kubectl run busybox-sleep --image=busybox --exec=sleep 3600"
    answer: 1
    hint: "kubectl run busybox-sleep --image=busybox -- sleep 3600"
    answer_command: "kubectl run busybox-sleep --image=busybox -- sleep 3600"
    goals:
      - description: "Pod **busybox-sleep** existe no cluster"
        hint: "kubectl run busybox-sleep --image=busybox -- sleep 3600"
        validation:
          command: "kubectl get pod busybox-sleep -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "busybox-sleep"
      - description: "Pod está executando o comando **sleep**"
        validation:
          command: "kubectl get pod busybox-sleep -o jsonpath='{.spec.containers[0].args}' 2>/dev/null"
          expected_contains: "sleep"
    teardown:
      - "kubectl delete pod busybox-sleep --ignore-not-found=true"
    explanation: "O '--' separa os argumentos do kubectl do comando do container. Sem ele, sleep 3600 seria interpretado como argumento do kubectl run. '--command' (com --) substitui o entrypoint da imagem."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/generated/kubectl_run/"
    doc_section: "Reference → kubectl run"

  - id: cka-lab-015
    cert: CKA
    topic: Storage
    difficulty: easy
    type: lab
    question: "Crie um ConfigMap chamado **app-config** com a chave **DB_HOST=postgres** e **DB_PORT=5432**."
    options:
      - "kubectl create configmap app-config --set DB_HOST=postgres --set DB_PORT=5432"
      - "kubectl create configmap app-config --from-literal=DB_HOST=postgres --from-literal=DB_PORT=5432"
      - "kubectl apply configmap app-config DB_HOST=postgres DB_PORT=5432"
      - "kubectl create configmap app-config --data 'DB_HOST=postgres,DB_PORT=5432'"
    answer: 1
    answer_command: "kubectl create configmap app-config --from-literal=DB_HOST=postgres --from-literal=DB_PORT=5432"
    validation:
      command: "kubectl get configmap app-config -o jsonpath='{.data.DB_HOST}'"
      expected_contains: "postgres"
    teardown:
      - "kubectl delete configmap app-config --ignore-not-found=true"
    explanation: "--from-literal aceita múltiplos pares chave=valor. --from-file cria a partir de arquivos. --from-env-file lê um arquivo .env."
    doc_url: "https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/"
    doc_section: "Tasks → Configure Pod → ConfigMap"

  - id: cka-lab-016
    cert: CKA
    topic: Storage
    difficulty: easy
    type: lab
    question: "Crie um Secret genérico chamado **db-secret** com a chave **password=S3cret123**."
    options:
      - "kubectl create secret generic db-secret --key=password=S3cret123"
      - "kubectl create secret generic db-secret --from-literal=password=S3cret123"
      - "kubectl create secret db-secret password=S3cret123"
      - "kubectl apply secret generic db-secret --data password=S3cret123"
    answer: 1
    answer_command: "kubectl create secret generic db-secret --from-literal=password=S3cret123"
    validation:
      command: "kubectl get secret db-secret -o jsonpath='{.data.password}'"
      expected_contains: "UzNjcmV0MTIz"
    teardown:
      - "kubectl delete secret db-secret --ignore-not-found=true"
    explanation: "Secrets do tipo 'generic' armazenam pares chave-valor com encode base64 automático. Use --from-literal para valores inline ou --from-file para arquivos."
    doc_url: "https://kubernetes.io/docs/concepts/configuration/secret/"
    doc_section: "Concepts → Configuration → Secrets"

  - id: cka-lab-017
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Obtenha o IP do pod **api-pod** usando jsonpath."
    options:
      - "kubectl get pod api-pod --field=.status.podIP"
      - "kubectl get pod api-pod -o jsonpath='{.status.podIP}'"
      - "kubectl describe pod api-pod | grep IP"
      - "kubectl get pod api-pod --ip"
    answer: 1
    answer_command: "kubectl get pod api-pod -o jsonpath='{.status.podIP}'"
    explanation: "-o jsonpath permite extrair campos específicos do JSON de resposta. Útil em scripts. Alternativa: -o custom-columns=IP:.status.podIP ou -o go-template='{{.status.podIP}}'."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/jsonpath/"
    doc_section: "Reference → JSONPath Support"

  - id: cka-lab-018
    cert: CKA
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Liste todos os recursos em todos os namespaces (pods, services, deployments) de uma vez."
    options:
      - "kubectl get all -A"
      - "kubectl list resources -A"
      - "kubectl get everything -A"
      - "kubectl get pods,svc,deployments -A"
    answer: 0
    answer_command: "kubectl get all -A"
    explanation: "kubectl get all lista os recursos mais comuns (pods, services, deployments, replicasets, statefulsets, daemonsets, jobs, cronjobs). Não inclui configmaps, secrets, pvc etc."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/"
    doc_section: "kubectl Cheat Sheet"

  # ── EASY: Workloads ───────────────────────────────────────
  - id: cka-lab-019
    cert: CKA
    topic: Workloads
    difficulty: easy
    type: lab
    question: "Crie um Deployment chamado **nginx-deploy** com a imagem **nginx:1.21** e **3 réplicas**.\n\nVerifique que o Deployment está pronto e que os pods estão Running."
    options:
      - "kubectl run nginx-deploy --image=nginx:1.21 --replicas=3"
      - "kubectl create deployment nginx-deploy --image=nginx:1.21 --replicas=3"
      - "kubectl deploy nginx-deploy --image=nginx:1.21 --count=3"
      - "kubectl new deployment nginx-deploy --image=nginx:1.21 --scale=3"
    answer: 1
    hint: "kubectl create deployment <nome> --image=<imagem> --replicas=<n>"
    answer_command: "kubectl create deployment nginx-deploy --image=nginx:1.21 --replicas=3"
    goals:
      - description: "Deployment **nginx-deploy** existe no cluster"
        hint: "kubectl create deployment nginx-deploy --image=nginx:1.21 --replicas=3"
        validation:
          command: "kubectl get deployment nginx-deploy -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "nginx-deploy"
      - description: "Deployment tem **3 réplicas** configuradas"
        validation:
          command: "kubectl get deployment nginx-deploy -o jsonpath='{.spec.replicas}' 2>/dev/null"
          expected_contains: "3"
      - description: "Deployment está usando a imagem **nginx:1.21**"
        validation:
          command: "kubectl get deployment nginx-deploy -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null"
          expected_contains: "nginx:1.21"
    teardown:
      - "kubectl delete deployment nginx-deploy --ignore-not-found=true"
    explanation: "kubectl create deployment cria um Deployment gerenciado por um ReplicaSet. --replicas define quantas instâncias do pod são mantidas."
    doc_url: "https://kubernetes.io/docs/concepts/workloads/controllers/deployment/"
    doc_section: "Concepts → Workloads → Deployments"

