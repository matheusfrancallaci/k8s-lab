    answer_command: "ETCDCTL_API=3 etcdctl snapshot save /tmp/etcd-backup.db --endpoints=https://127.0.0.1:2379 --cacert=/etc/kubernetes/pki/etcd/ca.crt --cert=/etc/kubernetes/pki/etcd/server.crt --key=/etc/kubernetes/pki/etcd/server.key"
    explanation: "etcdctl snapshot save requer ETCDCTL_API=3 e os certificados TLS (cacert, cert, key). No kubeadm, os certificados ficam em /etc/kubernetes/pki/etcd/. Verifique o backup com 'etcdctl snapshot status'."
