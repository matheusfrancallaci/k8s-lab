      expected_contains: "nginx"
    teardown:
      - "kubectl delete pod nginx-pod --ignore-not-found=true"
    explanation: "-f (--follow) ativa o streaming de logs em tempo real. Sem -f, mostra os logs até o momento e encerra. Use --tail=N para ver as últimas N linhas."
    doc_url: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/#interacting-with-running-pods"
