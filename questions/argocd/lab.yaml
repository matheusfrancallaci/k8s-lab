questions:
  # ── EASY: Core Concepts ───────────────────────────────────
  - id: argocd-lab-001
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Liste todas as Applications ArgoCD no namespace **argocd** via kubectl."
    options:
      - "kubectl get apps -n argocd"
      - "kubectl get applications.argoproj.io -n argocd"
      - "argocd app list"
      - "B e C estão corretas"
    answer: 3
    answer_command: "kubectl get applications.argoproj.io -n argocd"
    explanation: "Applications são CRDs (Custom Resource Definitions) do ArgoCD. Via kubectl: 'kubectl get applications.argoproj.io -n argocd' ou 'kubectl get app -n argocd'. Via CLI: 'argocd app list'. Os recursos ficam no namespace onde o ArgoCD está instalado (tipicamente 'argocd')."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/app-overview/"
    doc_section: "User Guide → Application Overview"

  - id: argocd-lab-002
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Crie uma Application ArgoCD via CLI que sincronize o repositório **https://github.com/org/app** (path: **manifests/**) para o namespace **production**."
    options:
      - "argocd app create my-app --repo=https://github.com/org/app --path=manifests/ --dest-namespace=production --dest-server=https://kubernetes.default.svc"
      - "kubectl create application my-app --git=https://github.com/org/app --path=manifests/ -n argocd"
      - "argocd create app my-app --source=https://github.com/org/app --target=production"
      - "argocd app new my-app --repository=https://github.com/org/app --path=manifests/ --namespace=production"
    answer: 0
    answer_command: "argocd app create my-app --repo=https://github.com/org/app --path=manifests/ --dest-namespace=production --dest-server=https://kubernetes.default.svc"
    explanation: "argocd app create requer: --repo (URL Git), --path (diretório no repo), --dest-server (cluster destino), --dest-namespace (namespace destino). Para o cluster local: --dest-server=https://kubernetes.default.svc. Adicione --sync-policy=automated para auto-sync."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/app-overview/#creating-apps-via-cli"
    doc_section: "User Guide → Creating Apps via CLI"

  - id: argocd-lab-003
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Sincronize manualmente a Application **my-app** via CLI do ArgoCD."
    options:
      - "argocd app refresh my-app"
      - "argocd app sync my-app"
      - "kubectl apply -n argocd -l app=my-app"
      - "argocd app update my-app --sync"
    answer: 1
    answer_command: "argocd app sync my-app"
    explanation: "argocd app sync dispara uma sincronização imediata, aplicando os manifests do Git ao cluster. Adicione --force para ignorar diferenças e forçar substituição. --dry-run previews as mudanças. --prune remove recursos que não estão mais no Git."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/"
    doc_section: "User Guide → Sync Options"

  - id: argocd-lab-004
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Verifique o status de sincronização e saúde da Application **my-app**."
    options:
      - "argocd app status my-app"
      - "kubectl describe application my-app -n argocd"
      - "argocd app get my-app"
      - "A e C estão corretas"
    answer: 2
    answer_command: "argocd app get my-app"
    explanation: "argocd app get mostra: Sync Status (Synced/OutOfSync), Health Status (Healthy/Degraded/Progressing/Missing), condições de erro, e os recursos gerenciados. Para monitorar continuamente: argocd app wait my-app --health. kubectl describe também mostra status via CRD."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/app-overview/"
    doc_section: "User Guide → Application Status"

  - id: argocd-lab-005
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Faça login no servidor ArgoCD via CLI apontando para **https://argocd.example.com**."
    options:
      - "argocd connect --server=https://argocd.example.com --user=admin"
      - "argocd login argocd.example.com"
      - "kubectl config set-context argocd --server=https://argocd.example.com"
      - "argocd auth login --endpoint=https://argocd.example.com"
    answer: 1
    answer_command: "argocd login argocd.example.com --username=admin --password=<password>"
    explanation: "argocd login autentica contra o API server do ArgoCD. Sem porta: usa 443 para HTTPS. Use --insecure para ignorar TLS em ambientes de teste. O token é salvo em ~/.config/argocd/config. argocd logout encerra a sessão."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/commands/argocd_login/"
    doc_section: "User Guide → CLI → argocd login"

  - id: argocd-lab-006
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Adicione um repositório Git privado ao ArgoCD usando SSH key."
    options:
      - "argocd repo add https://github.com/private/repo --type=git --ssh-key=~/.ssh/id_rsa"
      - "argocd repo add git@github.com:private/repo --ssh-private-key-path=~/.ssh/id_rsa"
      - "kubectl create secret generic repo-key --from-file=sshPrivateKey=~/.ssh/id_rsa -n argocd"
      - "argocd app create --repo=git@github.com:private/repo --ssh-key=~/.ssh/id_rsa"
    answer: 1
    answer_command: "argocd repo add git@github.com:private/repo --ssh-private-key-path=~/.ssh/id_rsa"
    explanation: "argocd repo add adiciona repositórios ao ArgoCD. Para SSH: use URL git@ e --ssh-private-key-path. Para HTTPS privado: --username e --password (ou PAT). O ArgoCD armazena as credenciais como Secrets no namespace argocd."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/private-repositories/"
    doc_section: "User Guide → Private Repositories"

  - id: argocd-lab-007
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Liste todos os clusters registrados no ArgoCD."
    options:
      - "argocd cluster list"
      - "kubectl get clusters -n argocd"
      - "argocd app list --clusters"
      - "kubectl get endpoints -n argocd"
    answer: 0
    answer_command: "argocd cluster list"
    explanation: "argocd cluster list mostra todos os clusters registrados (SERVER URL, NAME, STATUS). O cluster local sempre aparece como 'https://kubernetes.default.svc'. Para adicionar um cluster externo: argocd cluster add <context-name> do seu kubeconfig."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/operator-manual/cluster-management/"
    doc_section: "Operator Manual → Cluster Management"

  - id: argocd-lab-008
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Qual é o endereço do cluster Kubernetes **local** (in-cluster) que deve ser usado ao criar uma Application ArgoCD que deploye no mesmo cluster?"
    options:
      - "https://localhost:6443"
      - "https://kubernetes.default.svc"
      - "https://127.0.0.1:6443"
      - "https://cluster.local:443"
    answer: 1
    answer_command: "argocd app create app --dest-server=https://kubernetes.default.svc"
    explanation: "https://kubernetes.default.svc é o endpoint da API Kubernetes acessível de dentro do cluster (via Service 'kubernetes' no namespace 'default'). O ArgoCD usa esse endpoint para deployar no mesmo cluster onde está instalado. Para clusters externos, use a URL do API server externo."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#clusters"
    doc_section: "Operator Manual → Declarative Setup → Clusters"

  - id: argocd-lab-009
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Configure uma Application ArgoCD para sincronizar automaticamente quando há mudanças no repositório Git (**auto-sync**)."
    options:
      - "argocd app set my-app --sync-policy=auto"
      - "argocd app set my-app --auto-sync"
      - "argocd app set my-app --sync-policy=automated"
      - "kubectl annotate application my-app argocd.argoproj.io/auto-sync=true -n argocd"
    answer: 2
    answer_command: "argocd app set my-app --sync-policy=automated"
    explanation: "argocd app set --sync-policy=automated ativa o auto-sync (ArgoCD verifica o repo periodicamente e sincroniza automaticamente ao detectar diferenças). Adicione --self-heal para reverter mudanças manuais no cluster, e --auto-prune para deletar recursos removidos do Git."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/auto_sync/"
    doc_section: "User Guide → Auto Sync"

  - id: argocd-lab-010
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Visualize o diff entre o estado desejado (Git) e o estado atual do cluster para a Application **my-app**."
    options:
      - "argocd app status my-app --show-diff"
      - "argocd app diff my-app"
      - "kubectl diff -f manifests/ -n production"
      - "argocd app compare my-app"
    answer: 1
    answer_command: "argocd app diff my-app"
    explanation: "argocd app diff mostra as diferenças entre Git (desejado) e cluster (atual) — similar a 'kubectl diff'. Útil antes de sincronizar para revisar o que será aplicado. Status 'OutOfSync' significa que existe diff. Sem diff = 'Synced'."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/app-overview/#app-diff"
    doc_section: "User Guide → App Diff"

  - id: argocd-lab-011
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Delete a Application **old-app** do ArgoCD **sem** deletar os recursos Kubernetes associados."
    options:
      - "argocd app delete old-app --keep-resources"
      - "argocd app delete old-app --non-cascade"
      - "argocd app delete old-app"
      - "kubectl delete application old-app -n argocd"
    answer: 1
    answer_command: "argocd app delete old-app --non-cascade"
    explanation: "--non-cascade remove apenas o objeto Application do ArgoCD, mantendo os recursos Kubernetes (Deployments, Services, etc.) que foram criados por ele. Sem a flag, a deleção é cascade (deleta Application + todos os recursos gerenciados). Use --non-cascade quando quer manter o app rodando mas parar de gerenciá-lo via GitOps."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/app-overview/#deleting-an-application"
    doc_section: "User Guide → Deleting an Application"

  - id: argocd-lab-012
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Atualize a imagem de um Deployment via GitOps com ArgoCD. Qual é a abordagem correta?"
    options:
      - "kubectl set image deployment/app container=new-image:v2 → ArgoCD vai reverter a mudança (self-heal)"
      - "Fazer commit da mudança de imagem no repositório Git → ArgoCD sincroniza automaticamente"
      - "argocd app set my-app --image=new-image:v2"
      - "argocd app patch my-app --image=new-image:v2"
    answer: 1
    answer_command: "git commit -m 'feat: update image to v2' && git push"
    explanation: "GitOps: Git é a fonte de verdade. Toda mudança deve ir via commit no repositório. Com self-heal ativado, mudanças manuais diretas no cluster são revertidas pelo ArgoCD. O fluxo: PR → review → merge → ArgoCD detecta → sincroniza automaticamente."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/auto_sync/#automatic-self-healing"
    doc_section: "User Guide → Auto Sync → Self Healing"

  - id: argocd-lab-013
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Rotacione a senha do usuário **admin** do ArgoCD."
    options:
      - "argocd account update-password --current-password=<old> --new-password=<new>"
      - "kubectl edit secret argocd-initial-admin-secret -n argocd"
      - "argocd admin set-password --password=<new>"
      - "kubectl patch secret argocd-secret -n argocd --password=<new>"
    answer: 0
    answer_command: "argocd account update-password --account=admin --current-password=<old> --new-password=<new>"
    explanation: "argocd account update-password atualiza a senha via API. A senha inicial do admin fica em 'argocd-initial-admin-secret'. Para gerenciamento de usuários via declarativo: ConfigMap 'argocd-cm' (users) e 'argocd-rbac-cm' (roles). Prefira SSO (OIDC/SAML) para usuários humanos."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/commands/argocd_account_update-password/"
    doc_section: "User Guide → CLI → argocd account"

  - id: argocd-lab-014
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "A Application **my-app** está **OutOfSync**. Qual é a diferença entre **Refresh** e **Sync** no ArgoCD?"
    options:
      - "Refresh e Sync fazem a mesma coisa — são sinônimos"
      - "Refresh compara Git vs cluster e atualiza o status; Sync aplica as mudanças do Git ao cluster"
      - "Refresh reinicia os pods; Sync atualiza a imagem"
      - "Refresh atualiza o cache local; Sync push para o Git"
    answer: 1
    answer_command: "argocd app get my-app --refresh && argocd app sync my-app"
    explanation: "Refresh (Hard Refresh): ArgoCD faz novo fetch do Git e compara com o estado atual — atualiza o status da Application (Synced/OutOfSync) mas NÃO aplica mudanças. Sync: efetivamente aplica os manifests do Git ao cluster. Use Hard Refresh se o status estiver desatualizado."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/"
    doc_section: "User Guide → Sync Options"

  - id: argocd-lab-015
    cert: ArgoCD
    topic: Core Concepts
    difficulty: easy
    type: lab
    question: "Configure uma Application ArgoCD via **manifesto YAML declarativo** (Application CRD). Qual campo define a URL do repositório Git?"
    options:
      - "spec.source.git"
      - "spec.source.repoURL"
      - "spec.repository"
      - "spec.gitRepo"
    answer: 1
    answer_command: "kubectl apply -f application.yaml -n argocd"
    explanation: "Application CRD tem spec.source.repoURL (URL do Git), spec.source.path (diretório no repo), spec.source.targetRevision (branch/tag/commit), spec.destination.server (cluster) e spec.destination.namespace. Declarar Applications via YAML (GitOps-level) é a melhor prática — 'App of Apps pattern'."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#applications"
    doc_section: "Operator Manual → Declarative Setup → Applications"

  # ── MID: Advanced Features ────────────────────────────────
  - id: argocd-lab-016
    cert: ArgoCD
    topic: Helm
    difficulty: mid
    type: lab
    question: "Crie uma Application ArgoCD que deploy um chart Helm do repositório **https://charts.bitnami.com/bitnami** (chart: postgresql, namespace: db)."
    options:
      - "argocd app create postgres --repo=https://charts.bitnami.com/bitnami --chart=postgresql --dest-namespace=db --dest-server=https://kubernetes.default.svc"
      - "argocd app create postgres --helm-repo=https://charts.bitnami.com/bitnami --helm-chart=postgresql --namespace=db"
      - "argocd helm install postgres bitnami/postgresql --namespace=db"
      - "argocd app create postgres --source=helm:bitnami/postgresql --target=db"
    answer: 0
    answer_command: "argocd app create postgres --repo=https://charts.bitnami.com/bitnami --chart=postgresql --revision=12.0.0 --dest-namespace=db --dest-server=https://kubernetes.default.svc"
    explanation: "Para Helm charts direto de um Helm repository (não Git): use --chart (nome do chart) em vez de --path. --revision especifica a versão do chart. Para sobrescrever values: adicione --helm-set key=value ou --values-literal-file values.yaml."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/helm/"
    doc_section: "User Guide → Helm"

  - id: argocd-lab-017
    cert: ArgoCD
    topic: Helm
    difficulty: mid
    type: lab
    question: "Passe **values customizados** para um Helm chart gerenciado pelo ArgoCD sem modificar o Chart.yaml no repositório."
    options:
      - "argocd app set my-helm-app --helm-set image.tag=v2.0 --helm-set replicaCount=3"
      - "argocd app set my-helm-app --values=custom-values.yaml"
      - "kubectl apply -f helm-values-configmap.yaml -n argocd"
      - "argocd app create --override image.tag=v2.0"
    answer: 0
    answer_command: "argocd app set my-helm-app --helm-set image.tag=v2.0 --helm-set replicaCount=3"
    explanation: "--helm-set aplica overrides de values (equivalente ao -f ou --set do helm). Múltiplos --helm-set são acumulativos. Alternativa: --helm-set-file para valores de arquivos, --helm-values para múltiplos arquivos values.yaml do repositório."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/helm/#helm-set"
    doc_section: "User Guide → Helm → helm set"

  - id: argocd-lab-018
    cert: ArgoCD
    topic: GitOps
    difficulty: mid
    type: lab
    question: "Configure a Application para **sincronizar automaticamente e reverter mudanças manuais** feitas diretamente no cluster (self-healing)."
    options:
      - "argocd app set my-app --sync-policy=automated --self-heal"
      - "argocd app set my-app --auto-sync --revert-manual"
      - "argocd app set my-app --sync-policy=self-heal"
      - "kubectl annotate application my-app argocd.argoproj.io/self-heal=true -n argocd"
    answer: 0
    answer_command: "argocd app set my-app --sync-policy=automated --self-heal"
    explanation: "--self-heal faz o ArgoCD reverter automaticamente mudanças feitas manualmente no cluster (fora do Git). Garante que Git é sempre a fonte de verdade. Combine com --auto-prune para deletar recursos não presentes no Git. Essencial para GitOps rigoroso."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/auto_sync/#automatic-self-healing"
    doc_section: "User Guide → Auto Sync → Self Healing"

  - id: argocd-lab-019
    cert: ArgoCD
    topic: GitOps
    difficulty: mid
    type: lab
    question: "Implemente o **App of Apps pattern** do ArgoCD. Qual é o conceito fundamental?"
    options:
      - "Um Deployment que gerencia múltiplos pods de diferentes aplicações"
      - "Uma Application raiz que gerencia outras Applications ArgoCD via manifests YAML no Git"
      - "Um script que cria múltiplas Applications via argocd CLI em loop"
      - "Um Helm chart que instala múltiplos charts ao mesmo tempo"
    answer: 1
    answer_command: "argocd app create root-app --repo=... --path=apps/ --dest-server=... --dest-namespace=argocd"
    explanation: "App of Apps: uma Application 'root' aponta para um diretório Git que contém Application YAMLs. O ArgoCD gerencia as Applications filho automaticamente. Permite bootstrapping completo de um cluster a partir do Git. As Applications filho apontam para os apps reais."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/operator-manual/cluster-bootstrapping/"
    doc_section: "Operator Manual → Cluster Bootstrapping → App of Apps"

  - id: argocd-lab-020
    cert: ArgoCD
    topic: GitOps
    difficulty: mid
    type: lab
    question: "Qual é a diferença entre **sync waves** e **resource hooks** no ArgoCD?"
    options:
      - "São a mesma coisa — terminologias diferentes para o mesmo recurso"
      - "Sync waves definem ordem de sincronização por grupos de recursos; resource hooks executam Jobs em fases específicas (PreSync, Sync, PostSync)"
      - "Sync waves são para Helm; resource hooks são para Kustomize"
      - "Sync waves controlam rollback; resource hooks controlam health checks"
    answer: 1
    answer_command: "# Wave: kubectl annotate resource argocd.argoproj.io/sync-wave: '2'"
    explanation: "Sync Waves (argocd.argoproj.io/sync-wave): recursos com wave menor são aplicados primeiro. Resource Hooks (argocd.argoproj.io/hook: PreSync/Sync/PostSync/SyncFail/PostDelete): Jobs executados em fases específicas do sync (ex: migration antes do deploy, smoke test depois). Ambos controlam a ordem e podem ser combinados."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/sync-waves/"
    doc_section: "User Guide → Sync Waves"

  - id: argocd-lab-021
    cert: ArgoCD
    topic: Kustomize
    difficulty: mid
    type: lab
    question: "Configure uma Application ArgoCD usando **Kustomize** com overlay de produção localizado em **overlays/production/**."
    options:
      - "argocd app create my-app --repo=... --path=overlays/production/ --dest-namespace=production --dest-server=... --kustomize=true"
      - "argocd app create my-app --repo=... --kustomize-path=overlays/production/ --dest-namespace=production"
      - "argocd app create my-app --repo=... --path=overlays/production/ --dest-namespace=production --dest-server=..."
      - "argocd app create my-app --repo=... --kustomize=overlays/production/ --namespace=production"
    answer: 2
    answer_command: "argocd app create my-app --repo=https://github.com/org/app --path=overlays/production/ --dest-namespace=production --dest-server=https://kubernetes.default.svc"
    explanation: "ArgoCD detecta automaticamente Kustomize quando há um kustomization.yaml no --path. Não é necessário flag especial. O ArgoCD roda 'kustomize build' internamente. Para sobrescrever images: --kustomize-image nginx=nginx:v2 ou via spec.source.kustomize.images."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/kustomize/"
    doc_section: "User Guide → Kustomize"

  - id: argocd-lab-022
    cert: ArgoCD
    topic: RBAC
    difficulty: mid
    type: lab
    question: "Configure RBAC no ArgoCD para que o usuário **alice** tenha acesso de **leitura** a todas as Applications mas não possa sincronizar."
    options:
      - "argocd rbac create-role reader --permission=get,list --resource=applications"
      - "Editar o ConfigMap argocd-rbac-cm: adicionar 'p, alice, applications, get, */*, allow'"
      - "kubectl create role argocd-reader --verb=get,list --resource=applications -n argocd"
      - "argocd account update alice --role=readonly"
    answer: 1
    answer_command: "kubectl edit configmap argocd-rbac-cm -n argocd"
    explanation: "ArgoCD RBAC é configurado no ConfigMap 'argocd-rbac-cm'. Sintaxe Casbin: 'p, subject, resource, action, object, allow/deny'. Exemplo: 'p, alice, applications, get, */*, allow' e 'p, alice, applications, sync, */*, deny'. Roles built-in: role:admin, role:readonly."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/"
    doc_section: "Operator Manual → RBAC"

  - id: argocd-lab-023
    cert: ArgoCD
    topic: GitOps
    difficulty: mid
    type: lab
    question: "Configure o ArgoCD para **ignorar diferenças** específicas em um recurso (ex: campo **spec.replicas** gerenciado pelo HPA)."
    options:
      - "argocd app set my-app --ignore-field=spec.replicas"
      - "Adicionar spec.ignoreDifferences com group, kind e jsonPointers na Application YAML"
      - "kubectl annotate deployment app argocd.argoproj.io/ignore-diff=spec.replicas"
      - "argocd app set my-app --sync-exclude=spec.replicas"
    answer: 1
    answer_command: "kubectl edit application my-app -n argocd # adicionar spec.ignoreDifferences"
    explanation: "spec.ignoreDifferences permite que o ArgoCD ignore campos específicos ao calcular diff (não considera OutOfSync). Essencial para recursos gerenciados por controllers externos (HPA muda spec.replicas, webhooks adicionam annotations). Use jsonPointers: [\"/spec/replicas\"]."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/diffing/"
    doc_section: "User Guide → Diffing"

  - id: argocd-lab-024
    cert: ArgoCD
