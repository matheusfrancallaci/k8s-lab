    options:
      - "Fazer backup do etcd e restaurar o cluster do snapshot"
      - "Instalar ArgoCD novo + aplicar o Application root (App of Apps) do repositório Git — todas as Applications são recriadas automaticamente"
      - "argocd restore --from-backup=argocd-backup.tar.gz"
      - "kubectl apply -f argocd-export.yaml --force"
