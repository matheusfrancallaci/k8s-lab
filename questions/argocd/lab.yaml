  - id: argocd-lab-039
    cert: ArgoCD
    topic: Core Concepts
    difficulty: mid
    type: lab
    question: "Crie manualmente via kubectl um Application ArgoCD chamado **test-app** que sincronize o repositório de exemplo do ArgoCD (**https://github.com/argoproj/argocd-example-apps**, path: **guestbook**) para o namespace **default** do cluster local."
    options:
      - "kubectl apply -f test-app.yaml -n argocd"
      - "argocd app create test-app --repo=https://github.com/argoproj/argocd-example-apps --path=guestbook --dest-namespace=default --dest-server=https://kubernetes.default.svc"
      - "A e B estão corretas"
      - "kubectl create application test-app -n argocd"
    answer: 2
    hint: |
      Crie via YAML:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: test-app
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/argoproj/argocd-example-apps
            targetRevision: HEAD
            path: guestbook
          destination:
            server: https://kubernetes.default.svc
            namespace: default
          syncPolicy:
            automated: {prune: true, selfHeal: true}
    answer_command: "kubectl apply -f test-app.yaml -n argocd"
    goals:
      - description: "Application **test-app** existe no namespace **argocd**"
        hint: "Crie via YAML com kind: Application e namespace: argocd"
        validation:
          command: "kubectl get application test-app -n argocd -o jsonpath='{.metadata.name}' 2>/dev/null"
          expected_contains: "test-app"
      - description: "repoURL aponta para o repositório correto"
        validation:
          command: "kubectl get application test-app -n argocd -o jsonpath='{.spec.source.repoURL}' 2>/dev/null"
          expected_contains: "argocd-example-apps"
      - description: "path está configurado como **guestbook**"
        validation:
          command: "kubectl get application test-app -n argocd -o jsonpath='{.spec.source.path}' 2>/dev/null"
          expected_contains: "guestbook"
    teardown:
      - "kubectl delete application test-app -n argocd --ignore-not-found=true"
    explanation: "Applications ArgoCD podem ser criadas via YAML (kubectl apply) ou CLI (argocd app create). syncPolicy.automated ativa sync automático quando o Git muda. prune remove recursos deletados do Git. selfHeal restaura recursos modificados manualmente no cluster."
    doc_url: "https://argo-cd.readthedocs.io/en/stable/user-guide/app-overview/#creating-apps-via-ui"
    doc_section: "User Guide → Creating Apps"

