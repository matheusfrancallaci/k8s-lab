    question: "Integre o ArgoCD com um pipeline CI/CD: o CI deve **disparar um sync** do ArgoCD após push de nova imagem. Qual abordagem é recomendada?"
    options:
      - "CI faz 'kubectl set image' direto no cluster de produção"
      - "CI faz commit no repositório Git atualizando a tag da imagem → ArgoCD detecta e sincroniza"
      - "CI chama 'argocd app sync my-app' via CLI diretamente no pipeline"
      - "CI usa 'argocd app set --helm-set image.tag=new' para atualizar"
    answer: 1
    answer_command: "git commit -m 'ci: update image tag to $NEW_TAG' && git push"
    explanation: "Abordagem GitOps: CI atualiza o repositório de config (separado do repositório de código), ArgoCD detecta e sincroniza. Evite chamar argocd sync no CI — viola o princípio GitOps (Git como fonte de verdade). Use ArgoCD Image Updater para automatizar ainda mais. Separe repositório de código e repositório de configuração."
